  { id:229, cat:"第6章", q:"ヘリコプターにおいて、機体高度が「メインローター半径以下」になった際に顕著になる現象はどれか？", opts:["ボルテックス・リング・ステート", "地面効果", "オートローテーション"], ans:1, exp:"ローターの吹き下ろしが地面に当たって滞留し、空気の「座布団」のような効果で揚力が増す現象です。メインローター半径以下の高度で顕著です。" },
  { id:230, cat:"第6章", q:"ヘリコプターの垂直降下時、自らの吹き下ろし気流に巻き込まれて揚力を失う現象を何と呼ぶか？", opts:["地面効果", "ボルテックス・リング・ステート（VRS）", "テールローター・ストール"], ans:1, exp:"垂直降下中に自分の乱気流を吸い込んでしまい、揚力を喪失する現象です。急激な高度低下を招き、回復が困難な非常に危険な状態です。" },
  { id:231, cat:"第6章", q:"ボルテックス・リング・ステートを予防するための、効果的な降下方法はどれか？", opts:["さらに垂直にスロットルを下げて、素早く降下する。", "前進（水平移動）を組み合わせながら降下する。", "ローターの回転数を限界まで上げて降下する。"], ans:1, exp:"垂直に降りると自分の乱気流に入りやすいため、斜めに前進しながら（水平移動を加えながら）降下することで、VRS の発生を物理的に防げます。" },
  { id:232, cat:"第6章", q:"ヘリコプターが動力を喪失しても、ローターの慣性等を利用して軟着陸できる機構を何と呼ぶか？", opts:["スワッシュプレート", "オートローテーション", "フェールセーフ"], ans:1, exp:"エンジン停止時に、落下する際の風の力でローターを「風車」のように回し、その回転エネルギーで最後に着陸時の揚力を生み出す技術です。" },
  { id:233, cat:"第6章", q:"マルチローター（回転翼航空機）の離着陸において、周囲の物件から最低限離すべきとされる距離の目安はどれか？", opts:["10m以上", "30m以上", "100m以上"], ans:1, exp:"マルチローターであっても、安全確保のために周囲の物件（人・建物・車両）から 30m 以上の距離を保つことが原則とされています。" },
  { id:234, cat:"第6章", q:"最大離陸重量 25kg 以上の「大型機」の運航特性として、正しいものはどれか？", opts:["慣性力が大きいため、加減速や昇降に要する時間と距離が長くなる。", "機体が重いため、風の影響を全く受けなくなる。", "音が非常に静かになるため、周囲への配慮が不要になる。"], ans:0, exp:"重量が大きい機体は慣性の影響を強く受けます。操作してから実際に機体が止まったり曲がったりするまでに、小型機以上の時間と距離を要します。" },
  { id:235, cat:"第6章", q:"大型機の緊急着陸地点を選定する際、小型機と比較して考慮すべき点は何か？", opts:["アスファルト舗装がされていることが必須条件となる。", "慣性やサイズを考慮し、より広い範囲のエリアを確保する必要がある。", "電波干渉を受けやすいため、電波塔の近くは避ける。"], ans:1, exp:"大型機は慣性が大きく滑走距離も長くなる可能性があるため、緊急着陸の際にも小型機より広い障害物のないエリアが必要になります。" },
  { id:236, cat:"第6章", q:"夜間飛行における「視認性」の確保について、必須とされる装備はどれか？", opts:["機体の姿勢及び方向が正確に視認できる灯火。", "操縦者が装着するナイトビジョン（暗視ゴーグル）。", "機体下部に取り付けた強力なサーチライト。"], ans:0, exp:"夜間は機体の向き（前後左右）が肉眼で判別できないため、灯火によって姿勢と方向を正確に確認できる装備が必須となります。" },
  { id:237, cat:"第6章", q:"夜間飛行において、機体の「ビジョンセンサー」を利用する際の重大なリスクは何か？", opts:["センサーが赤外線を出しすぎて、機体が過熱する。", "暗所では周囲を正しく認識できず、衝突回避や姿勢安定機能が働かない可能性がある。", "夜間の電波ノイズにより、センサーの距離測定誤差が 10m 以上になる。"], ans:1, exp:"カメラ等の視覚情報を使うビジョンセンサーは、暗い場所では周囲の障害物や地面を認識できません。そのため、自動回避等の安全機能が効かない恐れがあります。" },
  { id:238, cat:"第6章", q:"夜間飛行を行う際の「飛行範囲」の設定基準として適切なものはどれか？", opts:["機体の灯火が容易に認識できる範囲に限定する。", "操縦者の勘に頼り、灯火が見えなくなっても飛行を継続する。", "GNSS の信号が 10基以上受信できている範囲内とする。"], ans:0, exp:"夜間は距離感が掴みにくいため、機体の灯火がはっきりと目視でき、機体の位置や方向が確実に把握できる範囲内での飛行に限定すべきです。" },
  { id:239, cat:"第6章", q:"目視外飛行において、補助者を配置「しない」場合に機体に求められる追加要件はどれか？", opts:["機体登録記号を 30cm 以上の巨大な文字で表示すること。", "地上において、機体の針路、姿勢、高度、速度及び周辺の気象状況等を把握できる装置。", "機体にスピーカーを装備し、常に警告音を鳴らし続けること。"], ans:1, exp:"補助者がいない場合、操縦者は自力で機体状況と周囲の気象を把握しなければなりません。そのため、テレメトリ情報（高度・速度・方位等）を表示できる装置が必要です。" },
  { id:240, cat:"第6章", q:"補助者なし目視外飛行において、機体の安全性を証明するために必要な実績はどれか？", opts:["機体の初期故障期間を超えた、想定される運用に基づく十分な飛行実績。", "無風状態の室内での 100時間のホバリング実績。", "製造メーカーによる、墜落確率が 0% であるとの公式な保証。"], ans:0, exp:"補助者なし目視外飛行はリスクが高いため、機体には「初期故障期間（初期不良が出やすい期間）」を無事に超えた十分な運用実績が求められます。" },
  { id:241, cat:"第6章", q:"目視外飛行のリスク軽減策として、飛行経路の選定基準として正しいものはどれか？", opts:["最短距離で目的地に到達できる、市街地の直上経路。", "山、海水域、河川、農用地など、第三者が存在する可能性が低い場所。", "常に鉄道や高速道路の真上を飛行させ、自機位置を特定しやすくする。"], ans:1, exp:"万一の墜落時の被害を最小限にするため、山、海、川、農地など、そもそも人がいない（第三者が存在する可能性が低い）場所を飛行経路に選びます。" },

// State
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let userAnswers = [];
let lastMode = 'all';
let sessionWrongIds = []; // wrong question IDs from current modal

// ===== STORAGE HELPERS =====
function getHistory() {
  try { return JSON.parse(localStorage.getItem('drone_history') || '[]'); } catch { return []; }
}
function saveHistory(h) { localStorage.setItem('drone_history', JSON.stringify(h)); }

function getQStats() {
  try { return JSON.parse(localStorage.getItem('drone_qstats') || '{}'); } catch { return {}; }
}
function saveQStats(s) { localStorage.setItem('drone_qstats', JSON.stringify(s)); }

function getModeName(mode) {
  const map = { all:'全問題(250問)', rand:'ランダム25問', cat1:'第1・2章', cat2:'第3章', cat3:'第4章', cat4:'第5章', cat5:'第6章', weak:'苦手問題', custom:'選択問題' };
  return map[mode] || mode;
}

// ===== SAVE / RESUME =====
function getSaveData() {
  try { return JSON.parse(localStorage.getItem('drone_save') || 'null'); } catch { return null; }
}
function deleteSaveData() { localStorage.removeItem('drone_save'); }

function saveCurrentProgress() {
  // Don't save if there's nothing in progress or already finished
  if (!currentQuestions.length) return;
  const data = {
    mode: lastMode,
    questionIds: currentQuestions.map(q => q.id),
    currentIndex,
    score,
    userAnswers,
    savedAt: new Date().toLocaleString('ja-JP', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }),
  };
  localStorage.setItem('drone_save', JSON.stringify(data));
  showSaveIndicator();
}

function showSaveIndicator() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

function renderResumePanel() {
  const save = getSaveData();
  const panel = document.getElementById('resumePanel');
  if (!save) { panel.style.display = 'none'; return; }

  const answered = save.userAnswers.filter(a => a !== null).length;
  const total = save.questionIds.length;
  const pct = Math.round((answered / total) * 100);

  panel.style.display = 'block';
  document.getElementById('resumeMeta').innerHTML =
    `📚 ${getModeName(save.mode)} &nbsp;｜&nbsp; ⏱ ${save.savedAt}<br>` +
    `<span style="color:var(--accent);font-weight:700">${answered}/${total}問</span> 回答済み（正解 ${save.score}問）`;
  document.getElementById('resumeProgressFill').style.width = pct + '%';
}

function resumeQuiz() {
  const save = getSaveData();
  if (!save) return;

  // Rebuild question order from saved IDs
  const idMap = Object.fromEntries(QUESTIONS.map(q => [q.id, q]));
  currentQuestions = save.questionIds.map(id => idMap[id]).filter(Boolean);
  score = save.score;
  userAnswers = save.userAnswers;
  lastMode = save.mode;
  answered = false;

  // Find first unanswered question
  const nextUnanswered = save.userAnswers.findIndex(a => a === null);
  currentIndex = nextUnanswered >= 0 ? nextUnanswered : save.currentIndex;

  show('quizScreen');
  renderQuestion();
  showToast(`Q${currentIndex + 1}から再開します`);
}

function discardSave() {
  if (!confirm('保存中のデータを削除して最初からやり直しますか？')) return;
  deleteSaveData();
  renderResumePanel();
  loadStats();
  showToast('セーブデータを削除しました');
}

function exitQuizWithSave() {
  const hasProgress = currentQuestions.length > 0 && userAnswers.some(a => a !== null);
  if (hasProgress) {
    saveCurrentProgress();
    showToast('進捗をセーブしました。ホームから続きを再開できます');
  }
  show('startScreen');
  loadStats();
}

// ===== LOAD STATS FOR HOME =====
const BEST_MODES = [
  { key: 'all',  label: '全問題\n(250問)' },
  { key: 'cat1', label: '第1・2章' },
  { key: 'cat2', label: '第3章' },
  { key: 'cat3', label: '第4章' },
  { key: 'cat4', label: '第5章' },
  { key: 'cat5', label: '第6章' },
  { key: 'rand', label: 'ランダム\n25問' },
];

function getBestScores() {
  try { return JSON.parse(localStorage.getItem('drone_best_scores') || '{}'); } catch { return {}; }
}
function saveBestScores(s) { localStorage.setItem('drone_best_scores', JSON.stringify(s)); }

function loadStats() {
  const hist = getHistory();
  document.getElementById('attemptCount').textContent = hist.length;
  renderBestScoresGrid();
  renderWeakPanel();
  renderResumePanel();
}

function renderBestScoresGrid() {
  const bests = getBestScores();
  const grid = document.getElementById('bestScoresGrid');
  grid.innerHTML = '';

  BEST_MODES.forEach(m => {
    const data = bests[m.key];
    const card = document.createElement('div');
    card.className = 'best-score-card' + (data ? ' has-score' : '');

    let color = 'var(--text-dim)';
    if (data) {
      color = data.pct >= 80 ? 'var(--correct)' : data.pct >= 60 ? 'var(--accent)' : 'var(--incorrect)';
    }

    card.innerHTML = `
      <div class="best-score-val ${data ? '' : 'no-data'}" style="${data ? 'color:' + color : ''}">
        ${data ? data.pct + '%' : '—'}
      </div>
      <div class="best-score-mode">${m.label.replace('\n', '<br>')}</div>
      ${data ? `<div class="best-score-attempts">${data.attempts}回挑戦</div>` : ''}
    `;
    grid.appendChild(card);
  });
}

function renderWeakPanel() {
  const qstats = getQStats();
  const weakIds = getWeakQuestionIds(qstats, 5);
  const panel = document.getElementById('weakPanel');
  if (weakIds.length === 0) { panel.style.display = 'none'; return; }

  panel.style.display = 'block';
  document.getElementById('weakPanelSub').textContent = `過去の挑戦で間違えた問題が ${weakIds.length} 問あります。集中的に復習しましょう。`;

  const pills = document.getElementById('weakPills');
  pills.innerHTML = '';
  weakIds.slice(0, 15).forEach(id => {
    const el = document.createElement('span');
    el.className = 'weak-pill-item';
    el.textContent = `問${id}`;
    pills.appendChild(el);
  });
  if (weakIds.length > 15) {
    const more = document.createElement('span');
    more.className = 'weak-pill-item';
    more.style.opacity = '0.6';
    more.textContent = `+${weakIds.length - 15}問`;
    pills.appendChild(more);
  }
}

function getWeakQuestionIds(qstats, minAttempts) {
  // Questions with accuracy < 70% and at least minAttempts attempts
  return Object.entries(qstats)
    .filter(([id, s]) => s.attempts >= minAttempts && (s.correct / s.attempts) < 0.7)
    .sort((a, b) => (a[1].correct / a[1].attempts) - (b[1].correct / b[1].attempts))
    .map(([id]) => parseInt(id));
}

function getAllWeakIds(qstats) {
  // Any question answered wrong at least once
  return Object.entries(qstats)
    .filter(([id, s]) => s.wrong > 0)
    .sort((a, b) => {
      const ra = a[1].correct / (a[1].attempts || 1);
      const rb = b[1].correct / (b[1].attempts || 1);
      return ra - rb;
    })
    .map(([id]) => parseInt(id));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== QUIZ LOGIC =====
function startQuiz(mode, specificIds) {
  lastMode = mode;
  let pool;

  if (specificIds) {
    pool = QUESTIONS.filter(q => specificIds.includes(q.id));
  } else if (mode === 'all') {
    pool = [...QUESTIONS];
  } else if (mode === 'rand') {
    pool = shuffle(QUESTIONS).slice(0, 25);
  } else if (mode === 'cat1') {
    pool = QUESTIONS.filter(q => q.cat === '第1・2章');
  } else if (mode === 'cat2') {
    pool = QUESTIONS.filter(q => q.cat === '第3章');
  } else if (mode === 'cat3') {
    pool = QUESTIONS.filter(q => q.cat === '第4章');
  } else if (mode === 'cat4') {
    pool = QUESTIONS.filter(q => q.cat === '第5章');
  } else if (mode === 'cat5') {
    pool = QUESTIONS.filter(q => q.cat === '第6章');
  } else if (mode === 'weak') {
    const qstats = getQStats();
    const weakIds = getAllWeakIds(qstats);
    pool = QUESTIONS.filter(q => weakIds.includes(q.id));
    if (pool.length === 0) {
      showToast('苦手問題のデータがありません。まず通常モードで挑戦してください。');
      return;
    }
  }

  currentQuestions = shuffle(pool);
  currentIndex = 0;
  score = 0;
  userAnswers = new Array(currentQuestions.length).fill(null);
  answered = false;

  show('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;

  document.getElementById('qCounter').textContent = `Q${currentIndex + 1} / ${total}`;
  document.getElementById('progressFill').style.width = ((currentIndex / total) * 100) + '%';
  document.getElementById('scoreBadge').textContent = `✓ ${score}`;
  document.getElementById('categoryTag').textContent = q.cat;
  document.getElementById('questionText').textContent = `問${q.id}｜${q.q}`;
  document.getElementById('explanationBox').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  answered = false;

  const letters = ['A', 'B', 'C'];
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i, btn);
    container.appendChild(btn);
  });

  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';
}

function selectAnswer(idx, btn) {
  if (answered) return;
  answered = true;

  const q = currentQuestions[currentIndex];
  userAnswers[currentIndex] = idx;
  const isCorrect = idx === q.ans;
  if (isCorrect) score++;

  // Update per-question stats
  const qstats = getQStats();
  if (!qstats[q.id]) qstats[q.id] = { attempts: 0, correct: 0, wrong: 0 };
  qstats[q.id].attempts++;
  if (isCorrect) qstats[q.id].correct++;
  else qstats[q.id].wrong++;
  saveQStats(qstats);

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('correct');
    else if (i === idx && !isCorrect) b.classList.add('incorrect');
  });

  const expBox = document.getElementById('explanationBox');
  expBox.style.display = 'block';
  expBox.innerHTML = `
    <div class="result-indicator ${isCorrect ? 'ok' : 'ng'}">
      ${isCorrect ? '✅ 正解！' : '❌ 不正解'}
    </div>
    <strong>解説：</strong>${q.exp}
  `;

  document.getElementById('scoreBadge').textContent = `✓ ${score}`;

  // Auto-save progress after every answer
  saveCurrentProgress();

  if (currentIndex < currentQuestions.length - 1) {
    document.getElementById('nextBtn').style.display = 'inline-flex';
    document.getElementById('nextBtn').textContent = '次の問題 →';
  } else {
    document.getElementById('nextBtn').style.display = 'inline-flex';
    document.getElementById('nextBtn').textContent = '結果を見る 📊';
  }
}

function nextQuestion() {
  if (currentIndex < currentQuestions.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  // Quiz finished — clear the save
  deleteSaveData();

  show('resultScreen');
  const total = currentQuestions.length;
  const pct = Math.round((score / total) * 100);

  // Save to history
  const wrongIds = currentQuestions
    .filter((q, i) => userAnswers[i] !== q.ans)
    .map(q => q.id);

  const hist = getHistory();
  hist.unshift({
    id: Date.now(),
    date: new Date().toLocaleString('ja-JP', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }),
    mode: lastMode,
    modeName: getModeName(lastMode),
    total,
    score,
    pct,
    wrongIds,
    questionIds: currentQuestions.map(q => q.id)
  });
  if (hist.length > 50) hist.pop();
  saveHistory(hist);

  // Update per-mode best score
  const bests = getBestScores();
  const modeKey = ['all','cat1','cat2','cat3','cat4','cat5','rand'].includes(lastMode) ? lastMode : null;
  if (modeKey) {
    if (!bests[modeKey]) bests[modeKey] = { pct: 0, attempts: 0 };
    bests[modeKey].attempts++;
    if (pct > bests[modeKey].pct) bests[modeKey].pct = pct;
    saveBestScores(bests);
  }

  loadStats();

  document.getElementById('resCorrect').textContent = score;
  document.getElementById('resIncorrect').textContent = total - score;
  document.getElementById('resTotal').textContent = total;

  const circ = document.getElementById('resultCircle');
  const circumference = 502;
  const offset = circumference - (pct / 100) * circumference;

  circ.style.stroke = pct >= 80 ? 'var(--correct)' : pct >= 60 ? 'var(--accent)' : 'var(--incorrect)';
  setTimeout(() => { circ.style.strokeDashoffset = offset; }, 100);

  let anim = 0;
  const step = () => {
    if (anim < pct) {
      anim++;
      document.getElementById('resultPct').textContent = anim + '%';
      setTimeout(step, 20);
    }
  };
  step();

  let grade, sub, color;
  if (pct >= 90) { grade = '🏆 優秀！'; sub = '素晴らしい成績です！合格圏内です。'; color = 'var(--correct)'; }
  else if (pct >= 70) { grade = '✈️ 合格圏内'; sub = '良好な成績です。苦手分野を復習しましょう。'; color = 'var(--accent)'; }
  else if (pct >= 50) { grade = '📚 もう少し'; sub = '基礎を固めて再挑戦しましょう。'; color = 'var(--warn)'; }
  else { grade = '🔄 要復習'; sub = '各編の解説をしっかり確認しましょう。'; color = 'var(--incorrect)'; }

  const gradeEl = document.getElementById('gradeText');
  gradeEl.style.color = color;
  gradeEl.textContent = grade;
  document.getElementById('gradeSub').textContent = sub;
}

function showReview() {
  show('reviewScreen');
  const content = document.getElementById('reviewContent');
  content.innerHTML = '';

  currentQuestions.forEach((q, i) => {
    const ua = userAnswers[i];
    const isCorrect = ua === q.ans;
    const letters = ['A', 'B', 'C'];

    const card = document.createElement('div');
    card.className = `review-card ${isCorrect ? 'right' : 'wrong'}`;
    card.innerHTML = `
      <div class="review-q-num">${q.cat} / 問${q.id}</div>
      <div class="review-q-text">${q.q}</div>
      <div class="review-answers">
        ${!isCorrect ? `<div class="review-your-answer">あなたの答え：${ua !== null ? letters[ua] + '. ' + q.opts[ua] : '未回答'}</div>` : ''}
        <div class="review-correct-answer">✅ 正解：${letters[q.ans]}. ${q.opts[q.ans]}</div>
      </div>
      <div class="review-explanation">${q.exp}</div>
    `;
    content.appendChild(card);
  });
}

function renderHistoryList() {
  const hist = getHistory();
  const container = document.getElementById('historyList');

  if (hist.length === 0) {
    container.innerHTML = `<div class="history-empty">📭 まだ挑戦履歴がありません<br>クイズに挑戦すると<br>ここに記録されます</div>`;
    return;
  }

  container.innerHTML = '';
  hist.forEach(h => {
    const pctColor = h.pct >= 80 ? 'var(--correct)' : h.pct >= 60 ? 'var(--accent)' : 'var(--incorrect)';
    const card = document.createElement('div');
    card.className = 'history-card';
    card.onclick = () => openHistoryDetail(h);

    const pillsHtml = h.wrongIds.slice(0, 12).map(id =>
      `<span class="wrong-pill">問${id}</span>`
    ).join('');
    const morePills = h.wrongIds.length > 12 ? `<span class="wrong-pill more">+${h.wrongIds.length - 12}</span>` : '';

    card.innerHTML = `
      <div class="history-card-top">
        <div>
          <div class="history-date">${h.date}</div>
        </div>
        <div class="history-pct" style="color:${pctColor}">${h.pct}%</div>
      </div>
      <div class="history-meta">
        <span>📚 ${h.modeName}</span>
        <span>✅ ${h.score}/${h.total}問正解</span>
        ${h.wrongIds.length > 0 ? `<span>❌ ${h.wrongIds.length}問ミス</span>` : '<span>🎉 全問正解</span>'}
      </div>
      ${h.wrongIds.length > 0 ? `<div class="history-wrong-pills">${pillsHtml}${morePills}</div>` : ''}
    `;
    container.appendChild(card);
  });
}

function renderWeakAnalysis() {
  const qstats = getQStats();
  const container = document.getElementById('weakAnalysis');

  const attempted = Object.keys(qstats);
  if (attempted.length === 0) {
    container.innerHTML = `<div class="history-empty">📊 問題ごとの分析は<br>クイズに挑戦すると<br>表示されます</div>`;
    return;
  }

  const weakIds = getAllWeakIds(qstats);
  const masterIds = Object.entries(qstats)
    .filter(([id, s]) => s.attempts >= 3 && s.correct === s.attempts)
    .map(([id]) => parseInt(id));

  container.innerHTML = '';

  // Summary
  const summary = document.createElement('div');
  summary.className = 'stat-card';
  summary.style.cssText = 'margin-bottom:16px;';
  summary.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center">
      <div><div class="stat-num" style="font-size:24px">${attempted.length}</div><div class="stat-label">挑戦済み問題</div></div>
      <div><div class="stat-num" style="font-size:24px;color:var(--incorrect)">${weakIds.length}</div><div class="stat-label">苦手問題</div></div>
      <div><div class="stat-num" style="font-size:24px;color:var(--correct)">${masterIds.length}</div><div class="stat-label">完璧な問題</div></div>
    </div>
  `;
  container.appendChild(summary);

  if (weakIds.length > 0) {
    const weakSection = document.createElement('div');
    weakSection.style.marginBottom = '16px';
    weakSection.innerHTML = `<div class="section-label" style="margin-bottom:10px">🔥 正答率の低い問題</div>`;

    const list = document.createElement('div');
    list.style.cssText = 'display:flex;flex-direction:column;gap:8px;';

    weakIds.slice(0, 20).forEach(id => {
      const s = qstats[id];
      const pct = Math.round((s.correct / s.attempts) * 100);
      const q = QUESTIONS.find(q => q.id === id);
      const item = document.createElement('div');
      item.style.cssText = 'background:var(--card);border:1px solid var(--card-border);border-radius:8px;padding:12px 14px;';
      item.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-family:Space Mono,monospace;font-size:11px;color:var(--text-dim)">問${id} / ${q ? q.cat : ''}</span>
          <span style="font-family:Space Mono,monospace;font-size:13px;color:${pct < 50 ? 'var(--incorrect)' : 'var(--warn)'};font-weight:700">${pct}%</span>
        </div>
        <div style="font-size:12px;line-height:1.5;color:var(--text-dim);margin-bottom:8px">${q ? q.q.slice(0, 60) + (q.q.length > 60 ? '…' : '') : ''}</div>
        <div style="display:flex;gap:8px;font-size:11px;color:var(--text-dim);margin-bottom:6px">
          <span>${s.attempts}回挑戦</span>
          <span style="color:var(--correct)">✓ ${s.correct}回正解</span>
          <span style="color:var(--incorrect)">✗ ${s.wrong}回不正解</span>
        </div>
        <div class="accuracy-bar"><div class="accuracy-fill" style="width:${pct}%;background:${pct < 50 ? 'var(--incorrect)' : 'var(--warn)'}"></div></div>
      `;
      list.appendChild(item);
    });

    weakSection.appendChild(list);
    container.appendChild(weakSection);

    const btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    btn.style.width = '100%';
    btn.textContent = '💪 苦手問題を集中練習';
    btn.onclick = () => startQuiz('weak');
    container.appendChild(btn);
  } else {
    const ok = document.createElement('div');
    ok.className = 'history-empty';
    ok.innerHTML = '🎉 現時点で苦手問題はありません！<br>引き続き練習を続けましょう。';
    container.appendChild(ok);
  }
}

function openHistoryDetail(h) {
  sessionWrongIds = h.wrongIds;
  const modal = document.getElementById('historyDetailModal');
  modal.style.display = 'flex';

  document.getElementById('modalTitle').textContent = `${h.date} — ${h.modeName}`;

  const allQs = QUESTIONS.filter(q => h.questionIds.includes(q.id));
  const letters = ['A', 'B', 'C'];

  let html = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;text-align:center">
      <div style="background:var(--card);border-radius:8px;padding:12px">
        <div style="font-family:Space Mono,monospace;font-size:22px;font-weight:700;color:${h.pct >= 80 ? 'var(--correct)' : h.pct >= 60 ? 'var(--accent)' : 'var(--incorrect)'}">${h.pct}%</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:4px">正解率</div>
      </div>
      <div style="background:var(--card);border-radius:8px;padding:12px">
        <div style="font-family:Space Mono,monospace;font-size:22px;font-weight:700;color:var(--correct)">${h.score}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:4px">正解</div>
      </div>
      <div style="background:var(--card);border-radius:8px;padding:12px">
        <div style="font-family:Space Mono,monospace;font-size:22px;font-weight:700;color:var(--incorrect)">${h.wrongIds.length}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:4px">不正解</div>
      </div>
    </div>
  `;

  if (h.wrongIds.length > 0) {
    html += `<div style="font-size:12px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;font-family:Space Mono,monospace;margin-bottom:10px">❌ 間違えた問題</div>`;
    html += `<div class="detail-q-list">`;
    h.wrongIds.forEach(id => {
      const q = QUESTIONS.find(q => q.id === id);
      if (!q) return;
      html += `
        <div class="detail-q-item wrong-item">
          <span class="detail-q-icon">❌</span>
          <div>
            <div style="font-size:11px;color:var(--text-dim);margin-bottom:3px">問${q.id} / ${q.cat}</div>
            <div style="font-size:12px;line-height:1.5">${q.q.slice(0, 80)}${q.q.length > 80 ? '…' : ''}</div>
            <div style="font-size:11px;color:var(--correct);margin-top:4px">✅ 正解：${letters[q.ans]}. ${q.opts[q.ans].slice(0, 40)}${q.opts[q.ans].length > 40 ? '…' : ''}</div>
          </div>
        </div>
      `;
    });
    html += `</div>`;
  } else {
    html += `<div style="text-align:center;color:var(--correct);padding:20px;font-size:14px">🎉 全問正解！</div>`;
  }

  document.getElementById('modalContent').innerHTML = html;

  const retryBtn = document.getElementById('modalRetryBtn');
  if (h.wrongIds.length > 0) {
    retryBtn.style.display = 'block';
    retryBtn.textContent = `この回の間違い ${h.wrongIds.length} 問を復習する`;
    retryBtn.onclick = () => {
      closeDetailModal();
      startQuiz('custom', h.wrongIds);
    };
  } else {
    retryBtn.style.display = 'none';
  }
}

function closeDetailModal() {
  document.getElementById('historyDetailModal').style.display = 'none';
}

function closeModal(e) {
  if (e.target.id === 'historyDetailModal') closeDetailModal();
}

function restartQuiz() {
  startQuiz(lastMode);
}

function exitQuiz() {
  show('startScreen');
}

function goHome() {
  show('startScreen');
}

function show(id) {
  ['startScreen','quizScreen','resultScreen','reviewScreen','historyScreen'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = 'none';
    el.style.flexDirection = '';
  });
  const target = document.getElementById(id);
  target.style.display = 'flex';
  target.style.flexDirection = 'column';
  window.scrollTo(0, 0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
loadStats();
show('startScreen');

// ===== PWA: Service Worker 登録 =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}

// ===== PWA: ホーム画面追加バナー =====
let deferredPrompt = null;
const installBanner = document.getElementById('installBanner');
const installBtn = document.getElementById('installBtn');
const installDismiss = document.getElementById('installDismiss');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // 初回訪問から3秒後に表示（すぐ出ると邪魔なため）
  setTimeout(() => {
    if (installBanner) installBanner.style.transform = 'translateY(0)';
  }, 3000);
});

if (installBtn) {
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    if (installBanner) installBanner.style.transform = 'translateY(120px)';
  });
}

if (installDismiss) {
  installDismiss.addEventListener('click', () => {
    if (installBanner) installBanner.style.transform = 'translateY(120px)';
  });
}

// インストール済み（standalone）の場合はバナーを非表示
if (window.matchMedia('(display-mode: standalone)').matches) {
  if (installBanner) installBanner.style.display = 'none';
}
</script>
