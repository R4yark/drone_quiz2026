<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ドローン操縦士 資格試験 クイズ</title>

<!-- ===== PWA ===== -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ドローンクイズ">
<meta name="theme-color" content="#00d4ff">
<link rel="apple-touch-icon" href="icon-192.png">
<!-- =============== -->

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #0a0e1a;
    --sky-mid: #0d1a2e;
    --accent: #00d4ff;
    --accent2: #00ff88;
    --warn: #ff6b35;
    --text: #e8f4f8;
    --text-dim: #7a9ab0;
    --card: rgba(255,255,255,0.04);
    --card-border: rgba(0,212,255,0.15);
    --correct: #00ff88;
    --incorrect: #ff4757;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--sky);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 40%, rgba(0,212,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 20%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 60%, rgba(0,212,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 85%, rgba(0,255,136,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 90%, rgba(0,212,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 55%, rgba(255,255,255,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Gradient orbs */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: -10%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .orb2 {
    position: fixed;
    bottom: -15%;
    right: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0,255,136,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  header {
    text-align: center;
    padding: 40px 0 30px;
  }

  .drone-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 20px rgba(0,212,255,0.6));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ===== START SCREEN ===== */
  #startScreen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 20px 0 60px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    width: 100%;
    max-width: 480px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    transition: all 0.3s;
  }

  .stat-card:hover {
    border-color: rgba(0,212,255,0.4);
    background: rgba(255,255,255,0.06);
  }

  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  .section-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 480px;
  }

  .section-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-family: 'Space Mono', monospace;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 28px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #0077ff);
    color: #000;
    box-shadow: 0 0 30px rgba(0,212,255,0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 0 40px rgba(0,212,255,0.5);
  }

  .btn-secondary {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--card-border);
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(0,212,255,0.4);
    transform: translateY(-1px);
  }

  .btn-outline {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    font-size: 13px;
    padding: 10px 20px;
  }

  .btn-outline:hover {
    background: rgba(0,212,255,0.1);
  }

  .mode-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 480px;
  }

  /* ===== QUIZ SCREEN ===== */
  #quizScreen {
    display: none;
    flex: 1;
    flex-direction: column;
    gap: 20px;
  }

  .progress-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .q-counter {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    white-space: nowrap;
    min-width: 70px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .score-badge {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .category-tag {
    display: inline-block;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 2px;
    color: var(--accent);
    border: 1px solid rgba(0,212,255,0.3);
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 28px;
    animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-text {
    font-size: clamp(15px, 2.5vw, 18px);
    font-weight: 500;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 24px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    width: 100%;
    text-align: left;
    padding: 16px 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.6;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(0,212,255,0.08);
    border-color: rgba(0,212,255,0.3);
    transform: translateX(3px);
  }

  .option-btn:disabled {
    cursor: default;
  }

  .option-letter {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dim);
    min-width: 20px;
    padding-top: 2px;
    transition: color 0.2s;
  }

  .option-btn.correct {
    background: rgba(0,255,136,0.12);
    border-color: var(--correct);
    color: var(--correct);
  }

  .option-btn.correct .option-letter { color: var(--correct); }

  .option-btn.incorrect {
    background: rgba(255,71,87,0.12);
    border-color: var(--incorrect);
    color: var(--incorrect);
  }

  .option-btn.incorrect .option-letter { color: var(--incorrect); }

  .option-btn.correct-missed {
    background: rgba(0,255,136,0.06);
    border-color: rgba(0,255,136,0.4);
    color: rgba(0,255,136,0.7);
  }

  /* Explanation */
  .explanation {
    margin-top: 16px;
    padding: 16px 20px;
    background: rgba(0,212,255,0.06);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-dim);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .explanation strong {
    color: var(--accent);
    font-weight: 700;
  }

  .result-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    font-size: 14px;
    font-weight: 700;
  }

  .result-indicator.ok { color: var(--correct); }
  .result-indicator.ng { color: var(--incorrect); }

  .nav-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding-bottom: 40px;
  }

  /* ===== RESULT SCREEN ===== */
  #resultScreen {
    display: none;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 0;
    gap: 32px;
  }

  .result-circle {
    position: relative;
    width: 180px;
    height: 180px;
  }

  .result-circle svg {
    transform: rotate(-90deg);
  }

  .result-circle-bg {
    fill: none;
    stroke: rgba(255,255,255,0.06);
    stroke-width: 10;
  }

  .result-circle-fill {
    fill: none;
    stroke-width: 10;
    stroke-linecap: round;
    stroke-dasharray: 502;
    stroke-dashoffset: 502;
    transition: stroke-dashoffset 1.5s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .result-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .result-pct {
    font-family: 'Space Mono', monospace;
    font-size: 40px;
    font-weight: 700;
    line-height: 1;
  }

  .result-pct-label {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .result-grade {
    text-align: center;
  }

  .grade-text {
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 900;
    margin-bottom: 8px;
  }

  .grade-sub {
    font-size: 14px;
    color: var(--text-dim);
  }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 480px;
  }

  .r-stat {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }

  .r-stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
  }

  .r-stat-num.green { color: var(--correct); }
  .r-stat-num.red { color: var(--incorrect); }
  .r-stat-num.blue { color: var(--accent); }

  .r-stat-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  .result-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 480px;
  }

  /* ===== REVIEW SCREEN ===== */
  #reviewScreen {
    display: none;
    flex: 1;
    flex-direction: column;
    gap: 16px;
    padding-bottom: 40px;
  }

  .review-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
  }

  .review-title {
    font-size: 18px;
    font-weight: 700;
  }

  .review-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 20px;
    border-left: 4px solid;
  }

  .review-card.wrong { border-left-color: var(--incorrect); }
  .review-card.right { border-left-color: var(--correct); }

  .review-q-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .review-q-text {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .review-answers {
    font-size: 13px;
    line-height: 1.8;
  }

  .review-your-answer { color: var(--incorrect); }
  .review-correct-answer { color: var(--correct); }
  .review-explanation {
    margin-top: 8px;
    padding: 10px 14px;
    background: rgba(0,212,255,0.05);
    border-radius: 6px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.3); border-radius: 3px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(13,26,46,0.95);
    border: 1px solid var(--card-border);
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 13px;
    color: var(--text);
    backdrop-filter: blur(20px);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== BEST SCORES GRID ===== */
  .best-scores-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .best-score-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
    transition: all 0.2s;
  }

  .best-score-card:hover {
    border-color: rgba(0,212,255,0.3);
    background: rgba(255,255,255,0.06);
  }

  .best-score-card.has-score {
    border-color: rgba(0,212,255,0.25);
  }

  .best-score-val {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .best-score-val.no-data {
    font-size: 18px;
    color: rgba(255,255,255,0.2);
  }

  .best-score-mode {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    line-height: 1.3;
  }

  .best-score-attempts {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.2);
    margin-top: 3px;
  }

  /* ===== HISTORY SCREEN ===== */
  #historyScreen {
    display: none;
    flex: 1;
    flex-direction: column;
    gap: 16px;
    padding-bottom: 40px;
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0 4px;
  }

  .history-title {
    font-size: 18px;
    font-weight: 700;
  }

  .history-empty {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 20px;
    font-size: 14px;
    line-height: 2;
  }

  .history-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .history-card:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(0,212,255,0.3);
    transform: translateX(3px);
  }

  .history-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .history-date {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .history-pct {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
  }

  .history-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .history-meta span {
    background: rgba(255,255,255,0.05);
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .history-wrong-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .wrong-pill {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(255,71,87,0.15);
    border: 1px solid rgba(255,71,87,0.3);
    color: var(--incorrect);
  }

  .wrong-pill.more {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.1);
    color: var(--text-dim);
  }

  /* Weak questions panel */
  .weak-panel {
    background: rgba(255,107,53,0.08);
    border: 1px solid rgba(255,107,53,0.3);
    border-radius: var(--radius);
    padding: 18px 20px;
    width: 100%;
    max-width: 480px;
  }

  .weak-panel-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--warn);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .weak-panel-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 14px;
    line-height: 1.6;
  }

  .weak-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }

  .weak-pill-item {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(255,107,53,0.15);
    border: 1px solid rgba(255,107,53,0.3);
    color: var(--warn);
  }

  /* Per-question accuracy tracker */
  .accuracy-bar {
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }

  .accuracy-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .history-detail-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }

  .history-detail-box {
    background: #0d1a2e;
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 520px;
    max-height: 80vh;
    overflow-y: auto;
  }

  .history-detail-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .history-detail-title {
    font-size: 16px;
    font-weight: 700;
  }

  .btn-close {
    background: rgba(255,255,255,0.08);
    border: none;
    color: var(--text);
    font-size: 18px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-close:hover { background: rgba(255,255,255,0.15); }

  .detail-q-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .detail-q-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
  }

  .detail-q-item.wrong-item {
    background: rgba(255,71,87,0.08);
    border: 1px solid rgba(255,71,87,0.2);
  }

  .detail-q-item.right-item {
    background: rgba(0,255,136,0.05);
    border: 1px solid rgba(0,255,136,0.15);
  }

  .detail-q-icon { font-size: 14px; flex-shrink: 0; }

  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 4px;
  }

  .tab-btn {
    flex: 1;
    padding: 8px 12px;
    border: none;
    border-radius: 7px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-dim);
    background: transparent;
  }

  .tab-btn.active {
    background: rgba(0,212,255,0.15);
    color: var(--accent);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ===== SAVE / RESUME PANEL ===== */
  .resume-panel {
    background: rgba(0,212,255,0.06);
    border: 1px solid rgba(0,212,255,0.35);
    border-radius: var(--radius);
    padding: 18px 20px;
    width: 100%;
    max-width: 480px;
    animation: fadeIn 0.4s ease;
  }

  .resume-panel-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .resume-panel-meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 14px;
    line-height: 1.7;
  }

  .resume-progress-bar {
    height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .resume-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
  }

  .resume-actions {
    display: flex;
    gap: 8px;
  }

  .save-indicator {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0,255,136,0.15);
    border: 1px solid rgba(0,255,136,0.4);
    color: var(--correct);
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    padding: 5px 12px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 50;
    pointer-events: none;
  }

  .save-indicator.show { opacity: 1; }

  @media (max-width: 480px) {
    .mode-buttons { grid-template-columns: 1fr; }
    .result-stats { grid-template-columns: repeat(3, 1fr); }
    .question-card { padding: 20px; }
  }
</style>
</head>
<body>
<div class="orb2"></div>
<div id="app">
  <header>
    <span class="drone-icon">🚁</span>
    <h1>ドローン操縦士 資格試験</h1>
    <p class="subtitle">DRONE PILOT LICENSE QUIZ</p>
  </header>

  <!-- START SCREEN -->
  <div id="startScreen">
    <!-- top row: total attempts -->
    <div class="stats-grid" style="grid-template-columns:1fr 1fr;margin-bottom:10px">
      <div class="stat-card">
        <div class="stat-num">250</div>
        <div class="stat-label">総問題数</div>
      </div>
      <div class="stat-card" style="cursor:pointer" onclick="showHistory()">
        <div class="stat-num" id="attemptCount">0</div>
        <div class="stat-label">挑戦回数 →</div>
      </div>
    </div>

    <!-- best scores per mode -->
    <div style="margin-bottom:20px">
      <div class="section-label" style="margin-bottom:10px">🏆 モード別 最高スコア</div>
      <div class="best-scores-grid" id="bestScoresGrid"></div>
    </div>

    <!-- Resume panel (shown when a save exists) -->
    <div class="resume-panel" id="resumePanel" style="display:none">
      <div class="resume-panel-title">💾 前回のつづきがあります</div>
      <div class="resume-panel-meta" id="resumeMeta"></div>
      <div class="resume-progress-bar">
        <div class="resume-progress-fill" id="resumeProgressFill" style="width:0%"></div>
      </div>
      <div class="resume-actions">
        <button class="btn btn-primary" style="flex:1" onclick="resumeQuiz()">▶ つづきから再開</button>
        <button class="btn btn-secondary" style="flex:1" onclick="discardSave()">🗑 最初からやり直す</button>
      </div>
    </div>

    <!-- Weak questions panel (shown when data exists) -->
    <div class="weak-panel" id="weakPanel" style="display:none">
      <div class="weak-panel-title">🔥 苦手問題</div>
      <div class="weak-panel-sub" id="weakPanelSub"></div>
      <div class="weak-pills" id="weakPills"></div>
      <button class="btn btn-primary" style="width:100%" onclick="startQuiz('weak')">💪 苦手問題を集中練習</button>
    </div>

    <div class="section-buttons">
      <div class="section-label">🎯 出題範囲を選択</div>
      <div class="mode-buttons">
        <button class="btn btn-primary" onclick="startQuiz('all')">📚 全問題 (250問)</button>
        <button class="btn btn-secondary" onclick="startQuiz('rand')">🎲 ランダム 25問</button>
      </div>
      <div class="mode-buttons">
        <button class="btn btn-secondary" onclick="startQuiz('cat1')">第1・2章<br><small>導入・安全の基本</small></button>
        <button class="btn btn-secondary" onclick="startQuiz('cat2')">第3章<br><small>無人航空機の規則</small></button>
      </div>
      <div class="mode-buttons">
        <button class="btn btn-secondary" onclick="startQuiz('cat3')">第4章<br><small>機体・電波・センサー</small></button>
        <button class="btn btn-secondary" onclick="startQuiz('cat4')">第5章<br><small>操縦者・運航体制</small></button>
      </div>
      <div class="mode-buttons">
        <button class="btn btn-secondary" onclick="startQuiz('cat5')" style="grid-column:1/-1">第6章<br><small>運航上のリスク管理</small></button>
      </div>
      <button class="btn btn-outline" style="width:100%;margin-top:4px" onclick="showHistory()">📅 挑戦履歴を見る</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quizScreen">
    <div class="progress-area">
      <div class="q-counter" id="qCounter">Q1 / 10</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="score-badge" id="scoreBadge">✓ 0</div>
    </div>
    <div class="question-card" id="questionCard">
      <div class="category-tag" id="categoryTag"></div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="explanation" id="explanationBox" style="display:none"></div>
    </div>
    <div class="nav-area">
      <button class="btn btn-outline" onclick="exitQuizWithSave()">← 中断・保存</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none">次の問題 →</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="resultScreen">
    <div class="result-circle">
      <svg width="180" height="180" viewBox="0 0 180 180">
        <circle class="result-circle-bg" cx="90" cy="90" r="80"/>
        <circle class="result-circle-fill" id="resultCircle" cx="90" cy="90" r="80"/>
      </svg>
      <div class="result-center">
        <div class="result-pct" id="resultPct">0%</div>
        <div class="result-pct-label">正解率</div>
      </div>
    </div>
    <div class="result-grade">
      <div class="grade-text" id="gradeText"></div>
      <div class="grade-sub" id="gradeSub"></div>
    </div>
    <div class="result-stats">
      <div class="r-stat">
        <div class="r-stat-num green" id="resCorrect">0</div>
        <div class="r-stat-label">正解</div>
      </div>
      <div class="r-stat">
        <div class="r-stat-num red" id="resIncorrect">0</div>
        <div class="r-stat-label">不正解</div>
      </div>
      <div class="r-stat">
        <div class="r-stat-num blue" id="resTotal">0</div>
        <div class="r-stat-label">問題数</div>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn btn-secondary" onclick="showReview()">📋 解説を確認する</button>
      <button class="btn btn-primary" onclick="restartQuiz()">🔄 もう一度挑戦</button>
      <button class="btn btn-outline" onclick="goHome()">🏠 ホームに戻る</button>
    </div>
  </div>

  <!-- REVIEW SCREEN -->
  <div id="reviewScreen">
    <div class="review-header">
      <div class="review-title">📋 解説一覧</div>
      <button class="btn btn-outline" onclick="showResult()">← 結果に戻る</button>
    </div>
    <div id="reviewContent"></div>
  </div>

  <!-- HISTORY SCREEN -->
  <div id="historyScreen">
    <div class="history-header">
      <div class="history-title">📅 挑戦履歴</div>
      <button class="btn btn-outline" onclick="goHome()">← ホームへ</button>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchHistoryTab('list', this)">履歴一覧</button>
      <button class="tab-btn" onclick="switchHistoryTab('weak', this)">苦手分析</button>
    </div>

    <div id="historyTabList" class="tab-content active">
      <div id="historyList"></div>
    </div>

    <div id="historyTabWeak" class="tab-content">
      <div id="weakAnalysis"></div>
    </div>
  </div>
</div>

<!-- History Detail Modal -->
<div id="historyDetailModal" class="history-detail-modal" style="display:none" onclick="closeModal(event)">
  <div class="history-detail-box">
    <div class="history-detail-header">
      <div class="history-detail-title" id="modalTitle"></div>
      <button class="btn-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div id="modalContent"></div>
    <button class="btn btn-primary" style="width:100%" id="modalRetryBtn">この回の間違いを復習する</button>
  </div>
</div>

<!-- PWA インストールバナー -->
<div id="installBanner" style="
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(135deg, #0d1a2e, #0a1628);
  border-top: 1px solid rgba(0,212,255,0.3);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 999;
  transform: translateY(120px);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  backdrop-filter: blur(20px);
">
  <span style="font-size:28px;flex-shrink:0">🚁</span>
  <div style="flex:1;min-width:0">
    <div style="font-size:13px;font-weight:700;color:#e8f4f8;margin-bottom:2px">ホーム画面に追加</div>
    <div style="font-size:11px;color:#7a9ab0">オフラインでも使えるアプリとして保存できます</div>
  </div>
  <button id="installBtn" style="
    background: linear-gradient(135deg,#00d4ff,#0077ff);
    border: none; border-radius: 8px;
    color: #000; font-weight:700; font-size:13px;
    padding: 8px 16px; cursor:pointer; white-space:nowrap;
    font-family:'Noto Sans JP',sans-serif;
  ">追加する</button>
  <button id="installDismiss" style="
    background:transparent; border:none;
    color:#7a9ab0; font-size:20px; cursor:pointer;
    padding:4px 8px; flex-shrink:0;
  ">✕</button>
</div>

<div class="toast" id="toast"></div>
<div class="save-indicator" id="saveIndicator">💾 セーブ済み</div>

<script>
const QUESTIONS = [
  { id:1, cat:"第1・2章", q:"無人航空機が「空の産業革命」と言われる理由として、期待されている役割はどれか？", opts:["単なるレクリエーションとしての普及", "物流、災害対応、インフラ点検等による社会課題の解決", "有人航空機の完全な代替"], ans:1, exp:"無人航空機は物流や災害対応など多様な分野での活用が期待されています。" },
  { id:2, cat:"第1・2章", q:"無人航空機操縦者技能証明制度が創設された主な目的はどれか？", opts:["機体の登録台数を増やすため", "操縦者の飛行時間を一律に管理するため", "知識と能力を判定し、飛行の安全を確保するため"], ans:2, exp:"安全確保のため、知識と能力を国が証明する制度です。" },
  { id:3, cat:"第1・2章", q:"登録講習機関で講習を修了し、修了審査に合格した場合に免除される試験はどれか？", opts:["学科試験", "身体検査", "実地試験"], ans:2, exp:"登録講習機関の講習修了により実地試験が免除されます。" },
  { id:4, cat:"第1・2章", q:"技能証明（免許）の有効期間は何年か？", opts:["2年", "3年", "5年"], ans:1, exp:"技能証明の有効期間は3年です。" },
  { id:5, cat:"第1・2章", q:"操縦者の役割として、あらゆる状況下で常に第一に考えるべきことはどれか？", opts:["人の安全を守ること", "機体の損傷を防ぐこと", "飛行計画通りの時間に終了させること"], ans:0, exp:"操縦者は常に人の安全を第一に考える責任があります。" },
  { id:6, cat:"第1・2章", q:"補助者を配置する場合、操縦者が飛行前に確認すべきことはどれか？", opts:["補助者の当日の体温", "役割分担と連絡手段の確保", "補助者の過去の飛行実績の全記録"], ans:1, exp:"役割分担と連絡手段の確保は安全体制の基本です。" },
  { id:7, cat:"第1・2章", q:"複数の技能証明保持者がいる場合、誰が操縦者であるべきか？", opts:["最も年長者", "その場の話し合いで適宜変更する", "飛行前に明確にしておく"], ans:2, exp:"混乱を防ぐため、事前に誰が操縦者か明確にします。" },
  { id:8, cat:"第1・2章", q:"航空機と無人航空機の進路が交差、又は接近する場合のルールはどれか？", opts:["有人航空機が回避する", "無人航空機側が回避する", "速度の速いほうが優先される"], ans:1, exp:"航空機の安全を優先し、無人航空機側が回避します。" },
  { id:9, cat:"第1・2章", q:"飛行に際して、騒音に関して配慮すべき事項はどれか？", opts:["日中であれば騒音を気にする必要はない", "騒音の発生に注意を払う", "機体が小さければ騒音対策は不要である"], ans:1, exp:"飛行に際しては騒音の発生に注意が必要です。" },
  { id:10, cat:"第1・2章", q:"飛行計画の中止や機体を帰還させる判断について、適切な考え方はどれか？", opts:["無理をせず、中止する勇気を持つ", "危険な状況を乗り切る技術を見せる", "予報が外れても、当初の計画を優先する"], ans:0, exp:"危険を事前に回避するため、中止する勇気が重要です。" },
  { id:11, cat:"第1・2章", q:"操縦者が事故を起こした際に問われる「刑事責任」に該当するものはどれか？", opts:["損害賠償責任", "業務上過失致死傷罪など", "技能証明の効力停止"], ans:1, exp:"死傷者を出した場合、業務上過失致死傷などの刑事罰の対象となります。" },
  { id:12, cat:"第1・2章", q:"事故により他人の物件を壊した場合に発生する「民事責任」の内容はどれか？", opts:["罰金の支払い", "損害賠償責任", "口頭注意"], ans:1, exp:"被害者に損害を償う責任を負います。" },
  { id:13, cat:"第1・2章", q:"航空法違反や重大な過失があった場合に行われる「行政処分」に含まれないものはどれか？", opts:["技能証明の取消", "技能証明の効力停止", "懲役刑"], ans:2, exp:"行政処分は効力停止や取消であり、懲役は刑事罰です。" },
  { id:14, cat:"第1・2章", q:"技能証明の効力停止期間として、定められていない期間はどれか？", opts:["1年", "9ヶ月", "3ヶ月"], ans:1, exp:"停止期間は1年、6月、3月のいずれかです。" },
  { id:15, cat:"第1・2章", q:"飛行計画を作成する際に考慮すべき事項はどれか？", opts:["操縦者の経験や機体性能に応じた無理のない計画", "SNSでの映え具合", "予備バッテリーの個数のみ"], ans:0, exp:"性能や能力を考慮した無理のない計画を立てます。" },
  { id:16, cat:"第1・2章", q:"飛行計画を通報（登録）するためのシステム名はどれか？", opts:["マイナンバーカードシステム", "ドローン情報基盤システム（DIPS）", "気象庁防災情報システム"], ans:1, exp:"DIPS等を用いて飛行計画を通報します。" },
  { id:17, cat:"第1・2章", q:"飛行予定地域の調査項目に含まれる「日出・日没時刻」を確認する理由はどれか？", opts:["夜間飛行の規制に該当するか判断するため", "気温の変化を知るため", "機体の色を決めるため"], ans:0, exp:"日出前・日没後は夜間飛行の規制対象となるためです。" },
  { id:18, cat:"第1・2章", q:"飛行前の機体点検について正しいものはどれか？", opts:["数日前に点検していれば、当日は不要である", "飛行前には必ず点検を行い、不具合があれば整備する", "異常音がしていても、飛べるなら問題ない"], ans:1, exp:"飛行前には必ず点検が必要です。" },
  { id:19, cat:"第1・2章", q:"収集すべき最新の気象情報に含まれないものはどれか？", opts:["風向・風速", "警報・注意報", "翌月の長期予報"], ans:2, exp:"飛行直前の「最新」の情報を収集する必要があります。" },
  { id:20, cat:"第1・2章", q:"地域情報の収集において確認すべき「条例」を設定している主体はどこか？", opts:["地方公共団体（都道府県・市区町村）", "近隣の住民", "機体メーカー"], ans:0, exp:"地方自治体独自の条例が設けられている場合があります。" },
  { id:21, cat:"第1・2章", q:"飛行中に空港事務所等と連絡をとるために確保しておくべき体制はどれか？", opts:["メールでの連絡", "携帯電話等による通話可能な体制", "伝書鳩による連絡"], ans:1, exp:"空港事務所等と常に連絡が取れる体制が必要です。" },
  { id:22, cat:"第1・2章", q:"操縦者の服装として適切なものはどれか？", opts:["素肌の露出が多い涼しい服装", "動きやすく、素肌の露出が少ない服装", "サンダルやハイヒール"], ans:1, exp:"安全のため動きやすく露出の少ない服装が基本です。" },
  { id:23, cat:"第1・2章", q:"体調管理について、事故の原因となりうる状態はどれか？", opts:["十分な睡眠をとった状態", "注意力が散漫になるような睡眠不足や疲労", "アルコールを全く摂取していない状態"], ans:1, exp:"睡眠不足や疲労は判断力を低下させ、事故の原因となります。" },
  { id:24, cat:"第1・2章", q:"特定飛行を行う際に、原本または写しを「携帯」しなければならない書類はどれか？", opts:["住民票", "許可書又は承認書", "機体の取扱説明書"], ans:1, exp:"特定飛行時は許可書・承認書の携行が必要です。" },
  { id:25, cat:"第1・2章", q:"技能証明を受けている者が特定飛行を行う際、携帯が義務付けられているものはどれか？", opts:["技能証明書", "卒業証書", "印鑑"], ans:0, exp:"技能証明を受けている場合はその携帯が必要です。" },
  { id:26, cat:"第1・2章", q:"飛行中に天候が悪化しそうになった場合の判断として正しいものはどれか？", opts:["せっかく準備したので飛行を強行する", "ただちに帰還させるか、緊急着陸させる", "機体が見えなくなっても自動飛行で継続する"], ans:1, exp:"安全第一で判断し、ただちに中止や帰還を行います。" },
  { id:27, cat:"第1・2章", q:"無人航空機の事故原因として、多発しているものはどれか？", opts:["十分な監視を行っていなかったこと", "鳥が攻撃してきたこと", "電波が突然消滅したこと"], ans:0, exp:"監視不足が原因の事故が多発しています。" },
  { id:28, cat:"第1・2章", q:"飛行中の周囲の監視において、衝突を注意すべき対象はどれか？", opts:["他の航空機、建物、電柱、高圧線、樹木、鳥など", "雲の形のみ", "地上のアリの動き"], ans:0, exp:"飛行の支障となるあらゆる物件に注意が必要です。" },
  { id:29, cat:"第1・2章", q:"衝突防止装置を搭載した機体を操縦する際の注意点はどれか？", opts:["装置があるため、周囲の監視は不要である", "衝突防止装置を過信せず、自らも監視を行う", "装置は常にOFFにしておくべきである"], ans:1, exp:"装置を過信せず、周囲の監視を徹底することが最大の安全対策です。" },
  { id:30, cat:"第1・2章", q:"補助者との情報共有において、配慮すべき事項はどれか？", opts:["誤解や伝達の遅れがないようにする", "専門用語は使わずに世間話をする", "必要な時以外は会話を禁止する"], ans:0, exp:"状況把握の誤解や伝達の遅れを防ぐ配慮が必要です。" },
  { id:31, cat:"第1・2章", q:"飛行後の点検について正しいものはどれか？", opts:["着陸した瞬間に機体を片付ける", "機体に不具合がないか点検し、次回の飛行に備える", "飛行後の点検は義務ではないので省略してよい"], ans:1, exp:"次回の飛行に備えた点検と手入れが重要です。" },
  { id:32, cat:"第1・2章", q:"飛行終了後の機体やバッテリーの保管方法として適切なものはどれか？", opts:["高温多湿な場所に放置する", "安全な状態で、適切な場所に保管する", "満充電のまま長期間放置する"], ans:1, exp:"安全な状態で適切な場所に保管します。" },
  { id:33, cat:"第1・2章", q:"特定飛行を行った場合、作成（記載）が義務付けられている書類はどれか？", opts:["日記", "飛行日誌", "収支報告書"], ans:1, exp:"特定飛行を行った場合は飛行日誌への記載が義務です。" },
  { id:34, cat:"第1・2章", q:"飛行日誌に記載すべき記録の種類に含まれないものはどれか？", opts:["飛行記録", "日常点検記録", "操縦者の昼食内容"], ans:2, exp:"飛行記録、日常点検記録、点検整備記録の3つが基本です。" },
  { id:35, cat:"第1・2章", q:"事故を起こした際、最初に行うべき行動はどれか？", opts:["SNSで報告する", "人の安全確認（ケガの有無の確認と救護）", "機体の修理代を計算する"], ans:1, exp:"慌てず落ち着いて、人の安全確認を最優先に行います。" },
  { id:36, cat:"第1・2章", q:"機体が墜落し、通電している場合の措置はどれか？", opts:["そのまま放置する", "速やかに電源を切るなど、危険防止の措置を講ずる", "火が出るまで待つ"], ans:1, exp:"二次災害（発火等" },
  { id:37, cat:"第1・2章", q:"プロペラがまだ回転している墜落機に近づく際の注意点はどれか？", opts:["素手でプロペラを止める", "不用意に接近せず、十分に注意する", "回転しているほうが安全である"], ans:1, exp:"回転するプロペラは非常に危険なため、不用意に近づきません。" },
  { id:38, cat:"第1・2章", q:"事故発生時の通報先として、内容に応じて連絡すべき機関はどこか？", opts:["警察署、消防署、国土交通省など", "最寄りのコンビニエンスストア", "機体を購入した販売店のみ"], ans:0, exp:"内容に応じ警察・消防・国土交通省へ連絡・報告します。" },
  { id:39, cat:"第1・2章", q:"無人航空機における「強制保険（自賠責）」の有無について正しいものはどれか？", opts:["車と同様に法律で加入が義務付けられている", "強制保険はなく、すべて任意保険である", "カテゴリーI飛行なら強制保険がある"], ans:1, exp:"無人航空機には自賠責のような強制保険はありません。" },
  { id:40, cat:"第1・2章", q:"事故の際の金銭的負担に備えて、加入が推奨されるものはどれか？", opts:["生命保険のみ", "賠償責任保険などの任意保険", "盗難保険のみ"], ans:1, exp:"万一の負担が大きいため、任意保険への加入が推奨されます。" },
  { id:41, cat:"第1・2章", q:"特定飛行に該当しない飛行であっても、飛行計画の通報や飛行日誌の記載はどうすべきか？", opts:["絶対に行ってはならない", "行うことが望ましい", "面倒なので不要である"], ans:1, exp:"安全管理と記録のため、記載することが望ましいです。" },
  { id:42, cat:"第1・2章", q:"「業務上過失致死傷」は、どのような法的責任に分類されるか？", opts:["刑事責任", "民事責任", "行政処分"], ans:0, exp:"懲役や罰金などの刑罰を伴うものです。" },
  { id:43, cat:"第1・2章", q:"技能証明の「取消」が行われる可能性があるのはどのような場合か？", opts:["航空法違反や非行、重大な過失があった場合", "飛行時間が10時間に満たない場合", "機体の色が派手すぎる場合"], ans:0, exp:"航空法違反や重大な過失は取消処分の対象となります。" },
  { id:44, cat:"第1・2章", q:"飛行前の準備として、安全なホバリングができる場所の設定は必要か？", opts:["何かあった時の対策として考えておくべきである", "プロなら不要である", "機体性能が良ければ不要である"], ans:0, exp:"緊急時の対策として事前に考えておくべきです。" },
  { id:45, cat:"第1・2章", q:"標高（海抜高度）だけでなく、障害物の位置や目標物を確認する目的はどれか？", opts:["操縦者の視力を試すため", "飛行の安全を確保し、状況を把握するため", "地図を新しく作成するため"], ans:1, exp:"周囲の状況を正確に把握するために不可欠な調査です。" },
  { id:46, cat:"第1・2章", q:"飛行中、周囲を監視する補助者を配置した場合、情報の共有はどう行うか？", opts:["事前に確認した方法で行う", "身振り手振りだけで行う", "補助者が勝手に判断して行動する"], ans:0, exp:"伝達の遅れがないよう、事前に決めた方法で行います。" },
  { id:47, cat:"第1・2章", q:"無人航空機の事故原因として、準備不足はどのように関係しているか？", opts:["直接的又は間接的な原因となっていることが多い", "準備をしても事故は防げないので関係ない", "準備不足が原因の事故はほとんどない"], ans:0, exp:"多くの事故が準備不足に起因しています。" },
  { id:48, cat:"第1・2章", q:"アルコール等の摂取に関する注意事項を守ることは、いつ求められるか？", opts:["業務で飛行する時だけ", "常に（体調管理の一環として）", "特定飛行の時だけ"], ans:1, exp:"レジャー・業務問わず、操縦者としての体調管理は常に必要です。" },
  { id:49, cat:"第1・2章", q:"事故が発生した際、再発防止のために残しておくべきものはどれか？", opts:["機体の破片のみ", "飛行ログ等の記録", "操縦者の反省文のみ"], ans:1, exp:"原因究明と再発防止のために記録を残すことが重要です。" },
  { id:50, cat:"第1・2章", q:"操縦者が「無理をしない」ための「勇気」とは何か？", opts:["悪天候でも突っ込んでいく勇気", "計画を中止し、帰還させる勇気", "誰よりも高く飛ばす勇気"], ans:1, exp:"無理をせず、危険を察知して回避する判断こそが操縦者の勇気です。" },
  { id:51, cat:"第3章", q:"航空法における「無人航空機」の重量の定義として正しいものはどれか？", opts:["本体の重量が 100g 以上のもの", "本体とバッテリーの合計重量が 100g 以上のもの", "本体とバッテリー、取り外し可能な付属品を合わせた重量が 100g 以上のもの"], ans:1, exp:"機体本体とバッテリーの合計重量で判断します。" },
  { id:52, cat:"第3章", q:"航空法上の「無人航空機」に該当しないものはどれか？", opts:["遠隔操作により飛行できる 150g の機体", "自動操縦によりプログラム飛行する 200g の機体", "ゴムの力だけで飛び、操縦ができない 200g の紙飛行機"], ans:2, exp:"遠隔操作や自動操縦ができないものは無人航空機に該当しません。" },
  { id:53, cat:"第3章", q:"無人航空機の登録の有効期間は何年か？", opts:["1年", "3年", "5年"], ans:1, exp:"機体登録の有効期間は3年です。" },
  { id:54, cat:"第3章", q:"登録を受けた際、機体に表示しなければならないものはどれか？", opts:["所有者の氏名", "登録記号", "製造番号"], ans:1, exp:"発行された登録記号を鮮明に表示する必要があります。" },
  { id:55, cat:"第3章", q:"最大離陸重量 25kg 未満の機体において、登録記号の文字の高さは何ミリメートル以上必要か？", opts:["3mm以上", "5mm以上", "10mm以上"], ans:0, exp:"25kg未満の機体は3mm以上、25kg以上の機体は25mm以上です。" },
  { id:56, cat:"第3章", q:"リモートID機能の搭載が免除されるケースとして、正しいものはどれか？", opts:["夜間飛行を行う場合", "十分な強度を持つ 30m 以下の紐などで係留して飛行させる場合", "目視外飛行を行う場合"], ans:1, exp:"30m以下の紐等による係留飛行などは免除対象です。" },
  { id:57, cat:"第3章", q:"リモートID機器から発信される情報に含まれないものはどれか？", opts:["機体の位置・速度・高度", "所有者の氏名・電話番号", "登録記号・製造番号"], ans:1, exp:"リモートIDには所有者等の個人情報は含まれません。" },
  { id:58, cat:"第3章", q:"航空法で「特定飛行」に該当しない、原則として許可・承認が不要な飛行形態を何と呼ぶか？", opts:["カテゴリーI飛行", "カテゴリーII飛行", "カテゴリーIII飛行"], ans:0, exp:"特定飛行に該当しないリスクの低い飛行がカテゴリーIです。" },
  { id:59, cat:"第3章", q:"「カテゴリーIII飛行」の定義として正しいものはどれか？", opts:["無人地帯での目視外飛行", "第三者上空における特定飛行", "空港周辺での目視内飛行"], ans:1, exp:"第三者上空での特定飛行が最もリスクの高いカテゴリーIIIです。" },
  { id:60, cat:"第3章", q:"航空法に基づき、原則として飛行が禁止されている「空域」に含まれないものはどれか？", opts:["空港等の周辺の上空", "海抜 150m 以上の空域", "地表又は水面から 150m 以上の高さの空域"], ans:1, exp:"海抜ではなく、直下の地表・水面からの高さが基準です。" },
  { id:61, cat:"第3章", q:"人口集中地区（DID）の上空を飛行させる場合、根拠となるデータは何か？", opts:["最新の住宅地図", "国勢調査の結果", "地方自治体の都市計画図"], ans:1, exp:"国勢調査の結果に基づき5年ごとに設定されます。" },
  { id:62, cat:"第3章", q:"航空法で規制されている「夜間飛行」とは、いつからいつまでの時間を指すか？", opts:["18時から翌朝6時まで", "日没から日出まで", "日没の30分後から日出の30分前まで"], ans:1, exp:"日没後から日出までが夜間飛行の規制対象です。" },
  { id:63, cat:"第3章", q:"「目視により常時監視」の定義に含まれるものはどれか？", opts:["双眼鏡を使用して機体を見ること", "矯正眼鏡やコンタクトレンズを使用して機体を見ること", "補助者が機体を見ること"], ans:1, exp:"自分の目（メガネ可" },
  { id:64, cat:"第3章", q:"第三者又は第三者の物件との間で保たなければならない距離は何メートル以上か？", opts:["10m", "30m", "50m"], ans:1, exp:"第三者やその物件から30m以上の距離を保つのが原則です。" },
  { id:65, cat:"第3章", q:"「物件」に該当しないものはどれか？", opts:["自動車", "高圧送電線", "樹木や雑草"], ans:2, exp:"土地や自然物（樹木等" },
  { id:66, cat:"第3章", q:"祭礼や縁日など、多数の者が集合する催しの上空で飛行させる際に中止基準となる風速は？", opts:["風速 3m/s 以上", "風速 5m/s 以上", "風速 10m/s 以上"], ans:1, exp:"催し場所上空では風速5m/s以上で中止が必要です。" },
  { id:67, cat:"第3章", q:"爆発物などの「危険物」を輸送することは原則禁止されているが、対象外となるものはどれか？", opts:["機体を作動させるために必要な燃料やバッテリー", "撮影用の花火", "農薬（散布目的以外での輸送）"], ans:0, exp:"燃料やバッテリーなどは危険物輸送の対象外です。" },
  { id:68, cat:"第3章", q:"「物件の投下」に該当する行為はどれか？", opts:["農薬を霧状に散布する", "荷物を地表にそっと置く", "機体を地表に着陸させる"], ans:0, exp:"液体や霧状のものの散布も「物件の投下」に含まれます。" },
  { id:69, cat:"第3章", q:"捜索又は救助のための特例が適用される主体はどこか？", opts:["個人のボランティア団体", "国や地方公共団体、又はこれらから依頼を受けた者", "すべての民間企業"], ans:1, exp:"国や自治体、又はその依頼を受けた者による緊急時の飛行です。" },
  { id:70, cat:"第3章", q:"煙突などの高い構造物から何メートル以内の空域であれば、150m 以上の高さでも禁止空域から除外されるか？", opts:["10m以内", "30m以内", "100m以内"], ans:1, exp:"高層構造物の周辺30m以内は150m以上でも禁止空域から除外されます。" },
  { id:71, cat:"第3章", q:"航空機と無人航空機の進路が接近する場合、どちらが回避の義務を負うか？", opts:["常に有人航空機", "常に無人航空機", "先に相手を見つけた方"], ans:1, exp:"航空機の安全を優先し、無人航空機側が回避します。" },
  { id:72, cat:"第3章", q:"無人航空機の操縦者が遵守すべきアルコールに関するルールはどれか？", opts:["酒気帯び（0.15mg/L以上）のみ禁止", "アルコールの影響により正常な飛行ができないおそれがある状態での飛行禁止", "業務外であれば飲酒操縦も許容される"], ans:1, exp:"濃度に関わらず、アルコールを保有した状態での飛行は禁止です。" },
  { id:73, cat:"第3章", q:"飛行前の確認事項として、航空法で定められていないものはどれか？", opts:["気象情報の確認", "燃料又はバッテリーの残量の確認", "操縦者の過去の全飛行経歴の暗唱"], ans:2, exp:"外部点検、空域確認、気象確認、燃料確認などが義務です。" },
  { id:74, cat:"第3章", q:"事故が発生した際、直ちに行うべき対応の順番として適切なものはどれか？", opts:["報告書の作成 → 国土交通省へ連絡 → 救護", "飛行の中止 → 負傷者の救護 → 警察・消防への通報 → 国土交通大臣への報告", "機体の回収 → SNSでの周知 → 修理依頼"], ans:1, exp:"安全確保と救護を最優先し、その後に報告を行います。" },
  { id:75, cat:"第3章", q:"航空法上の「事故」の定義に含まれないものはどれか？", opts:["無人航空機による人の重傷", "航空機との衝突", "機体が木に引っかかり、数分で回収できた軽微な事案"], ans:2, exp:"人の死傷（重傷以上" },
  { id:76, cat:"第3章", q:"重大インシデント（事故が発生するおそれがあると認められる事態）に該当するものはどれか？", opts:["飛行中にバッテリーが 50% になった", "飛行中に制御不能となった", "飛行後にプロペラに小さな傷を見つけた"], ans:1, exp:"制御不能や発火、航空機との衝突のおそれなどは重大インシデントです。" },
  { id:77, cat:"第3章", q:"特定飛行を行う際、飛行計画の通報（登録）に使用するシステムはどれか？", opts:["e-Gov", "ドローン情報基盤システム（DIPS）", "マイナンバーポータル"], ans:1, exp:"DIPSを通じて飛行計画を通報します。" },
  { id:78, cat:"第3章", q:"特定飛行を行った場合、遅滞なく飛行日誌に記載しなければならない3つの記録はどれか？", opts:["飛行記録、日常点検記録、点検整備記録", "飛行記録、バッテリー購入記録、写真撮影記録", "離着陸時刻、操縦者の住所、天気の推移"], ans:0, exp:"飛行記録、日常点検記録、点検整備記録の3つが基本です。" },
  { id:79, cat:"第3章", q:"技能証明（免許）試験に関して不正行為があった場合、合格の無効や、その後何年以内の受験禁止処分を受けることがあるか？", opts:["1年以内", "2年以内", "3年以内"], ans:1, exp:"不正があった場合は2年以内の受験禁止となることがあります。" },
  { id:80, cat:"第3章", q:"二等無人航空機操縦士の技能証明を受けた者が、眼鏡使用の条件を無視して飛行させた場合、どのような違反になるか？", opts:["条件の範囲外での特定飛行（違反）", "マナー違反だが法律上は問題ない", "機体認証の違反"], ans:0, exp:"免許に付された条件に違反した特定飛行となります。" },
  { id:81, cat:"第3章", q:"航空法違反により技能証明の効力が「停止」される期間として、正しいものはどれか？", opts:["1ヶ月、2ヶ月、3ヶ月のいずれか", "3ヶ月、6ヶ月、1年のいずれか", "常に一律 6ヶ月"], ans:1, exp:"行政処分としての停止期間は1年、6月、3月のいずれかです。" },

  { id:88, cat:"第3章", q:"アマチュア無線を使用した無人航空機の運用について、正しいものはどれか？", opts:["仕事などの業務に利用できる", "金銭上の利益のためではなく、個人の興味による利用に限られる", "免許なしで誰でも利用できる"], ans:1, exp:"アマチュア無線を業務（仕事" },

  { id:96, cat:"第3章", q:"模型航空機（100g未満）であっても、航空法により飛行が禁止されている場所はどこか？", opts:["空港等の周辺、150m 以上の高さ、緊急用務空域など", "自宅の庭", "人口集中地区（DID）のすべて"], ans:0, exp:"100g未満でも、空港周辺や150m以上、緊急用務空域は規制対象です。" },
  { id:97, cat:"第3章", q:"技能証明に係る行政処分の点数制度において、最も点数が高い（15点）違反はどれか？", opts:["飲酒操縦、事故時の危険防止措置違反、飛行計画の変更指示違反", "日誌の不記載", "免許証の不携帯"], ans:0, exp:"これらは即座に免許取消（15点以上" },

  { id:99, cat:"第3章", q:"「レベル 3.5 飛行」において、立入管理措置を代替できるものは何か？", opts:["デジタル技術（機上カメラ）による確認", "大きな声での警告", "機体の派手な色"], ans:0, exp:"機上カメラで無人であることを確認することで補助者を代替できます。" },

  { id:101, cat:"第4章", q:"回転翼航空機（マルチローター）と比べて、飛行機の特徴として正しいものはどれか？", opts:["垂直離着陸や空中でのホバリングが可能である", "エネルギー効率が高く、長距離・長時間の飛行が可能である", "低速での飛行が得意で、狭い場所での離着陸に適している"], ans:1, exp:"飛行機は揚力を効率的に得られるため、長距離飛行に向いています。" },
  { id:102, cat:"第4章", q:"飛行機において、翼面から空気が剥離して舵が効かなくなる、極めて危険な状態を何と呼ぶか？", opts:["ホバリング", "失速", "バンクターン"], ans:1, exp:"低速や過度の上昇角で空気が剥離することを失速といいます。" },
  { id:103, cat:"第4章", q:"回転翼航空機（ヘリコプター）において、メインローターの反トルクを打ち消す役割を持つ部位はどれか？", opts:["スワッシュプレート", "テールローター", "スキッド"], ans:1, exp:"メインローターの回転による反作用を打ち消すのがテールローターです。" },

  { id:106, cat:"第4章", q:"夜間飛行を行う際、必須となる装備はどれか？", opts:["機体の姿勢及び方向が正確に視認できる灯火", "4K以上の高画質カメラ", "パラシュート"], ans:0, exp:"夜間は視認性が低いため、灯火による姿勢・方向の確認が不可欠です。" },

  { id:108, cat:"第4章", q:"飛行機が重力に対抗して浮き上がるために、主翼で発生させる力はどれか？", opts:["抗力", "揚力", "推力"], ans:1, exp:"翼の上下の圧力差などで発生する上向きの力が揚力です。" },

  { id:111, cat:"第4章", q:"フライトコントロールシステムを構成するデバイスのうち、回転角速度を測定するものはどれか？", opts:["加速度センサ", "ジャイロセンサ", "気圧センサ"], ans:1, exp:"ジャイロセンサは傾きの変化（角速度" },

  { id:114, cat:"第4章", q:"気圧の変化を読み取って高度を計測するセンサはどれか？", opts:["超音波センサ", "レーザーセンサ", "気圧センサ"], ans:2, exp:"気圧が高いほど高度が低く、低いほど高度が高いことを利用します。" },
  { id:115, cat:"第4章", q:"リチウムポリマーバッテリー（LiPo）のセル当たりの公称電圧は一般的に何Vか？", opts:["1.2V", "3.7V", "12.0V"], ans:1, exp:"1セルあたり公称3.7Vが一般的です。" },
  { id:116, cat:"第4章", q:"バッテリーの「容量」を表す単位として用いられるものはどれか？", opts:["V（ボルト）", "W（ワット）", "Ah（アンペアアワー）"], ans:2, exp:"AhやmAhで、取り出せる電気の総量を表します。" },
  { id:117, cat:"第4章", q:"電動機において、メンテナンスが容易で長寿命な特徴を持つモーターはどれか？", opts:["ブラシモーター", "ブラシレスモーター", "蒸気モーター"], ans:1, exp:"摩擦部分がないため長寿命でノイズも少ないのが特徴です。" },
  { id:118, cat:"第4章", q:"モーターの回転数を制御し、ローターの揚力や推力を変化させる装置はどれか？", opts:["ESC（エレクトロニックスピードコントローラー）", "IMU", "送信機"], ans:0, exp:"フライトコントローラーからの指示をモーターの回転数に変えます。" },
  { id:119, cat:"第4章", q:"日本で一般的に普及している送信機の操作モードのうち、右スティックの上下で「スロットル（上昇・降下）」を行うものはどれか？", opts:["モード1", "モード2", "モード3"], ans:0, exp:"日本では、右にスロットルがあるモード1が多く使われます。" },
  { id:120, cat:"第4章", q:"リチウムポリマーバッテリーの保管方法として、最も適切なものはどれか？", opts:["満充電の状態で保管する", "60%程度の充電量を目安に保管する", "完全に放電させた状態で保管する"], ans:1, exp:"満充電や放電状態での保管は、劣化や膨らみの原因になります。" },
  { id:121, cat:"第4章", q:"冬季の飛行において、バッテリーの性能はどう変化するか？", opts:["放電能力が低下し、飛行時間が短くなる", "電圧が上がり、飛行時間が長くなる", "特に変化はない"], ans:0, exp:"低温下では化学反応が鈍くなり、出力や持続時間が低下します。" },
  { id:122, cat:"第4章", q:"電波の性質のうち、障害物の後ろに回り込む性質を何と呼ぶか？", opts:["直進", "反射", "回折"], ans:2, exp:"波長が長いほど回折しやすく、障害物の裏に届きやすくなります。" },
  { id:123, cat:"第4章", q:"2.4GHz帯の電波の特徴として正しいものはどれか？", opts:["回折しにくく直進性が高いため、障害物の影響を受けやすい", "水中でも減衰せずに遠くまで届く", "あらゆる障害物を透過する"], ans:0, exp:"2.4GHzは直進性が強いため、障害物による遮断に注意が必要です。" },
  { id:124, cat:"第4章", q:"送信アンテナから出た電波が建物などで反射し、複数の経路で受信機に届くことで通信が不安定になる現象はどれか？", opts:["マルチパス", "フェールセーフ", "ジオフェンス"], ans:0, exp:"反射波の干渉により、一時的に操縦不能になることがあります。" },
  { id:125, cat:"第4章", q:"無線通信において、電力損失なく電波が届くために必要な、見通しを確保すべき楕円体の空間を何と呼ぶか？", opts:["フレネルゾーン", "安全マージン", "デッドゾーン"], ans:0, exp:"この範囲に障害物があると、通信エラーが起きやすくなります。" },
  { id:126, cat:"第4章", q:"日本の準天頂衛星システムの愛称はどれか？", opts:["GLONASS", "Galileo", "みちびき（QZSS）"], ans:2, exp:"日本の真上を長時間飛行する準天頂衛星です。" },
  { id:127, cat:"第4章", q:"GNSS測位において、数cm～数mレベルの極めて精度の高い測位が可能になる方式はどれか？", opts:["単独測位", "RTK（リアルタイムキネマティック）", "無線LAN測位"], ans:1, exp:"固定局からの補正情報を利用する、高精度な測位方式です。" },

  { id:129, cat:"第4章", q:"地磁気センサに悪影響を及ぼす（磁気干渉を起こす）可能性のある構造物はどれか？", opts:["木造の物置", "高圧送電線や変電所", "プラスチック製のフェンス"], ans:1, exp:"電流が流れる場所や鉄骨構造物は磁場を乱します。" },
  { id:130, cat:"第4章", q:"リチウムポリマーバッテリーが「膨らんでいる」場合の適切な対応はどれか？", opts:["そのまま使い続ける", "ガスを抜いて平らにする", "使用を中止し、適切に交換・廃棄する"], ans:2, exp:"膨らみは内部ガスの発生（劣化" },

  { id:132, cat:"第4章", q:"電波の電力密度は、距離が「2倍」になるとどうなるか？", opts:["1/2 になる", "1/4 になる", "変わらない"], ans:1, exp:"電波の電力密度は距離の2乗に反比例して減衰します。" },
  { id:133, cat:"第4章", q:"複数のセルで構成されるリチウムポリマーバッテリーの充電において、各セルの電圧を揃えるために重要なことは何か？", opts:["バランス端子を接続して充電する", "急速充電のみを行う", "冷やしながら充電する"], ans:0, exp:"各セルの充電状態を均一に保つことが長持ちと安全の秘訣です。" },

  { id:192, cat:"第5章", q:"運航において補助者が果たすべき主な役割はどれか？", opts:["操縦者の代わりに常にプロポを持つ", "離着陸場所や飛行経路周辺の安全確認、第三者の立入管理", "操縦者の食事の準備のみ"], ans:1, exp:"周囲の監視や立入管理を行い操縦者をサポートします。" },
  { id:193, cat:"第5章", q:"操縦者と補助者の間のコミュニケーションにおいて重要なことはどれか？", opts:["あらかじめ決められた手段を用いて正確に行う", "必要がない限り一切話さない", "専門用語は一切使わずに世間話をする"], ans:0, exp:"伝達の遅れや誤解がないよう事前に決めた方法で行います。" },
  { id:194, cat:"第5章", q:"安全マージンを考慮した立入管理措置の範囲（危険半径）は、原則としてどのくらいか？", opts:["高度と同じ数値又は 30m のいずれか長い方", "常に一律 100m", "機体の大きさの2倍"], ans:0, exp:"万一の墜落に備えた安全な無人地帯の範囲です。" },
  { id:195, cat:"第5章", q:"飛行の逸脱を防止するために有効な、仮想的な壁を設定する機能はどれか？", opts:["ジオフェンス機能", "ズーム機能", "スリープ機能"], ans:0, exp:"設定した範囲から機体が外に出ないようにする機能です。" },
  { id:196, cat:"第5章", q:"飛行計画の策定時に、着陸予定地点に戻れないリスクに備えて確保しておくべき場所はどれか？", opts:["緊急着陸地点", "観光スポット", "新しい離陸地点"], ans:0, exp:"予定地点に戻れない場合の予備の着陸場所です。" },
  { id:197, cat:"第5章", q:"操縦者と安全管理の役割を分担させるために配置することが望ましい役割はどれか？", opts:["安全管理者（運航管理者）", "広報担当者", "会計責任者"], ans:0, exp:"操縦に専念できるよう安全を統括する役割を置くのが望ましいです。" },
  { id:198, cat:"第5章", q:"操縦者が疲労を感じている場合の適切な判断はどれか？", opts:["気合で飛行を継続する", "無理をせず、飛行を中断するか交代する", "栄養ドリンクを飲んで全速力で飛ばす"], ans:1, exp:"操縦者は疲労を感じても継続しがちなため、適切な管理が必要です。" },
  { id:199, cat:"第5章", q:"事故の原因究明や再発防止のために記録しておくべきデータはどれか？", opts:["飛行ログ（フライトデータ）", "操縦者のその日の運勢", "使用したSDカードのメーカー名"], ans:0, exp:"事故の原因を分析するために不可欠な記録です。" },
  { id:200, cat:"第5章", q:"カテゴリーIII飛行において、地上の第三者への被害を軽減するために機体に装備が検討されるものはどれか？", opts:["パラシュートや衝撃緩和材", "より大きな警告音を出すスピーカー", "機体を派手にするための装飾"], ans:0, exp:"万一の落下時に第三者への被害を最小限にする装備です。" },
  { id:201, cat:"第6章", q:"無人航空機の運航において、「ハザード」の定義として正しいものはどれか？", opts:["事故等につながる可能性のある具体的な危険要素（潜在的なものを含む）", "事故が発生した結果として生じる損害の大きさ", "事故が発生する確率（頻度）"], ans:0, exp:"ハザードとは事故につながる危険要素を指します。" },
  { id:202, cat:"第6章", q:"運航における「リスク」を計量する際の2つの要素はどれか？", opts:["機体重量と飛行速度", "予測される頻度（発生確率）と結果の重大性（被害の大きさ）", "操縦者の年齢と飛行経験"], ans:1, exp:"リスクは「頻度」と「重大性」の組み合わせで評価します。" },
  { id:203, cat:"第6章", q:"リスクを許容可能な程度まで低減するための2つのアプローチはどれか？", opts:["機体価格を下げるか、保険の等級を上げる", "事象の発生確率を低減するか、事象発生による被害を軽減する", "飛行速度を上げるか、飛行高度を下げる"], ans:1, exp:"発生確率を下げるか、被害を小さくするかのいずれか、又は両方です。" },
  { id:204, cat:"第6章", q:"飛行領域に加えるべき「危険半径」の範囲として原則的なものはどれか？", opts:["常に一律 30m", "常に一律 100m", "高度と同じ数値又は 30m のいずれか長い方"], ans:2, exp:"高度と同じ距離、または最低30mの範囲を無人とするのが基本です。" },
  { id:205, cat:"第6章", q:"飛行の逸脱を防止するために有効な、ソフトウェアで飛行禁止空域を設定する機能はどれか？", opts:["オートフォーカス機能", "ジオフェンス機能", "スリープ機能"], ans:1, exp:"ジオフェンスにより仮想的な壁を設定し、逸脱を防ぎます。" },
  { id:206, cat:"第6章", q:"操縦と安全管理の役割を分担させるために配置することが望ましい役割はどれか？", opts:["安全管理者（運航管理者）", "会計責任者", "機体デザイナー"], ans:0, exp:"操縦に専念できるよう安全管理者を置くのが望ましい体制です。" },
  { id:207, cat:"第6章", q:"飛行計画の策定時に、着陸予定地点に戻れないリスクに備えて確保しておくべき場所はどれか？", opts:["新しい離陸地点", "観光スポット", "緊急着陸地点"], ans:2, exp:"着陸予定地点に戻れない場合に備えた予備の場所です。" },
  { id:208, cat:"第6章", q:"目視が限界域付近となる飛行において、障害物との距離差を把握するために有効な対策はどれか？", opts:["サングラスを外す", "補助者を配置する", "機体のスピードを最大にする"], ans:1, exp:"遠方では距離感が掴みにくいため、補助者による監視が有効です。" },
  { id:209, cat:"第6章", q:"航空法に基づき、目視により常時監視して飛行させることが困難な気象状態（濃霧等）での飛行はどうすべきか？", opts:["近距離であれば継続できる", "飛行させてはならない", "自動飛行であれば問題ない"], ans:1, exp:"目視監視ができない気象状態での飛行は禁止されています。" },
  { id:210, cat:"第6章", q:"天気図において、等圧線の間隔が狭いほど風はどうなるか？", opts:["弱くなる", "強くなる", "風向きが一定になる"], ans:1, exp:"等圧線の間隔が狭いほど気圧差が大きく、風が強まります。" },
  { id:211, cat:"第6章", q:"北半球の高気圧において、風は中心からどのように吹き出すか？", opts:["時計回りに吹き出す", "反時計回りに吹き出す", "垂直に吹き出す"], ans:0, exp:"高気圧は中心から時計回りに吹き出します。" },
  { id:212, cat:"第6章", q:"低気圧の中心部付近では、一般的にどのような気流が発生し、天気はどうなるか？", opts:["下降気流が発生し、天気は良くなる", "上昇気流が発生し、天気は悪くなる", "無風状態になり、快晴となる"], ans:1, exp:"低気圧は上昇気流により雲が発生し、天気が悪化します。" },
  { id:213, cat:"第6章", q:"「寒冷前線」が通過した後の風向きと気温の変化として正しいものはどれか？", opts:["風向きが急変し、気温が下がる", "風向きは変わらず、気温が上がる", "風が止まり、気温が一定になる"], ans:0, exp:"寒冷前線通過後は風向きが急変し、北寄りの風に変わって気温が下がります。" },
  { id:214, cat:"第6章", q:"夏の日差しの強い沿岸部で、日中に陸上に向かって吹く局地的な風を何と呼ぶか？", opts:["山風", "海風（海陸風）", "ビル風"], ans:1, exp:"日中は陸の温度が高いため、海から陸へ風が吹きます。" },
  { id:215, cat:"第6章", q:"山岳地帯において、夜間に冷えた空気が山から降りてくる風を何と呼ぶか？", opts:["谷風", "山風", "つむじ風"], ans:1, exp:"夜間に山から谷へ吹く風が山風です。" },
  { id:216, cat:"第6章", q:"積乱雲等により発生する、極めて強烈な下降流が地表にぶつかり四方に広がる現象を何と呼ぶか？", opts:["ダウンバースト", "地面効果", "回折"], ans:0, exp:"強烈な下降気流が地表で広がる現象で、極めて危険です。" },
  { id:217, cat:"第6章", q:"風が入れ替わる際のほぼ無風状態を指す用語はどれか？", opts:["突風", "凪（朝凪・夕凪）", "乱気流"], ans:1, exp:"海風と陸風が入れ替わる際の無風状態を凪といいます。" },
  { id:218, cat:"第6章", q:"太陽光パネルやアスファルトの地面が多い場所で発生しやすい気流はどれか？", opts:["上昇気流", "下降気流", "水平気流"], ans:0, exp:"地表面の熱により空気が暖められると上昇気流が発生します。" },
  { id:219, cat:"第6章", q:"冬季の低温環境において、バッテリー性能にどのような影響があるか？", opts:["電圧が上がり、飛行時間が長くなる", "持続時間（飛行可能時間）が短くなる可能性がある", "全く影響はない"], ans:1, exp:"低温下ではバッテリーの放電能力が低下し、飛行時間が短くなります。" },
  { id:220, cat:"第6章", q:"飛行機の離着陸において、風向はどのように選ぶのが原則か？", opts:["追い風", "向かい風", "横風"], ans:1, exp:"揚力を得やすく、失速を防ぐため向かい風が原則です。" },
  { id:221, cat:"第6章", q:"飛行機を追い風で離着陸させた場合に生じる主なリスクはどれか？", opts:["失速や滑走路を逸脱する危険", "機体が軽くなりすぎる危険", "上昇が止まらなくなる危険"], ans:0, exp:"追い風では対気速度が不足し失速したり、着陸時にオーバーランする危険があります。" },
  { id:222, cat:"第6章", q:"飛行機で上空待機（ホバリング代わり）を行うための方法はどれか？", opts:["その場に静止する", "サークルを描くように旋回飛行を行う", "エンジンを止めて滑空する"], ans:1, exp:"飛行機はホバリングができないため、旋回して待機します。" },
  { id:223, cat:"第6章", q:"回転翼航空機（ヘリコプター）において、地面効果が顕著になりやすい高度は？", opts:["メインローター半径以下の高度", "機体全長の10倍の高度", "高度に関係なく一定である"], ans:0, exp:"ローター半径以下の高度で地面効果が顕著になります。" },
  { id:224, cat:"第6章", q:"ヘリコプターが垂直降下する際に、自らの吹き下ろし気流に巻き込まれる危険な現象はどれか？", opts:["地面効果", "ボルテックス・リング・ステート", "マルチパス"], ans:1, exp:"垂直降下中に自らの乱気流に巻き込まれ揚力を失う現象です。" },
  { id:225, cat:"第6章", q:"ボルテックス・リング・ステートを防止するための有効な操縦はどれか？", opts:["真下に一気に降下する", "前進（水平移動）させながら降下する", "モーターを逆回転させる"], ans:1, exp:"水平移動を加えながら降下することで、自らの気流から逃れられます。" },
  { id:226, cat:"第6章", q:"ヘリコプターの動力が停止した際、ローターの慣性を利用して軟着陸させる機構はどれか？", opts:["オートリターン", "オートローテーション", "オートフォーカス"], ans:1, exp:"エンジン停止時にローターの回転を維持して降りる技術です。" },
  { id:227, cat:"第6章", q:"プロペラガードがないヘリコプターの離着陸エリアについて、適切な考え方はどれか？", opts:["ガード付きのマルチローターより広いエリアが必要である", "ガードがないため、狭い場所でも安全である", "エリアの広さは気にする必要がない"], ans:0, exp:"接触時のリスクが高いため、より広い安全距離が必要です。" },
  { id:228, cat:"第6章", q:"マルチローターの離陸地点において、操縦者等と保つことが推奨される距離は？", opts:["0m（密着する）", "3m以上（又は機体指定の距離）", "常に 100m以上"], ans:1, exp:"離陸時は機体から 3m 以上の距離を保つことが推奨されます。" },
  { id:229, cat:"第6章", q:"大型機（25kg以上）の運航において、特に注意すべき機体の特性はどれか？", opts:["慣性力が大きく、増減速や上昇・降下に時間と距離を要する", "機体が軽いため、風に飛ばされやすい", "音が全くしないため、周囲が気づきにくい"], ans:0, exp:"重い機体は慣性が大きく、急な動作ができないため早めの操舵が必要です。" },
  { id:230, cat:"第6章", q:"夜間飛行において、操縦者が事前に実施しておくべき準備はどれか？", opts:["目視外飛行の高度な訓練", "第三者の立入りの無い安全な場所での訓練", "機体の色を黒く塗りつぶす訓練"], ans:1, exp:"夜間は視界が悪いため、安全な場所での事前訓練が不可欠です。" },
  { id:231, cat:"第6章", q:"夜間飛行において、機体の姿勢や方向を確認するために必須となる装備はどれか？", opts:["高画質カメラ", "灯火（ナビゲーションライト等）", "大きなスピーカー"], ans:1, exp:"姿勢と方向を把握するための灯火が必須装備です。" },
  { id:232, cat:"第6章", q:"夜間飛行では原則として避けるべき飛行形態はどれか？", opts:["目視内飛行", "目視外飛行", "高度 30m 以下の飛行"], ans:1, exp:"夜間の目視外飛行は極めてリスクが高いため、原則行いません。" },
  { id:233, cat:"第6章", q:"目視外飛行において、補助者を配置する場合の推奨装備はどれか？", opts:["双眼鏡", "虫眼鏡", "望遠鏡"], ans:0, exp:"遠方の機体や周囲の安全を確認するために双眼鏡が推奨されます。" },
  { id:234, cat:"第6章", q:"目視外飛行を行う機体に最低限必要な「フェールセーフ機能」に含まれないものはどれか？", opts:["電波断絶時の自動帰還", "バッテリー異常時の安全な自動着陸", "機体ケースの自動洗浄"], ans:2, exp:"安全に直結する機能（帰還、着陸等" },
  { id:235, cat:"第6章", q:"目視外飛行において、補助者を配置しない場合に機体に求められる要件（色等）は？", opts:["地上の景色に馴染む迷彩色", "航空機からの視認性を高める灯火や塗色", "透明なパーツの使用"], ans:1, exp:"有人機等から見えやすくするための対策が必要です。" },
  { id:236, cat:"第6章", q:"飛行経路に設定する「緊急着陸地点」の選定基準として適切なものはどれか？", opts:["第三者の立入りが少なく、安全に不時着できる場所", "人通りの多い商店街の真ん中", "池や湖の真ん中（水没してもよい場所）"], ans:0, exp:"万一の際に第三者に被害を及ぼさない場所を選定します。" },
  { id:237, cat:"第6章", q:"リスク評価において、「被害の発生確率」を低減する対策の例はどれか？", opts:["パラシュートを装着する", "信頼性の高い機体を使用し、点検を徹底する", "損害賠償保険の金額を上げる"], ans:1, exp:"整備や点検により「故障する確率」そのものを下げます。" },
  { id:238, cat:"第6章", q:"リスク評価において、「被害の大きさ（結果の重大性）」を軽減する対策の例はどれか？", opts:["飛行回数を減らす", "パラシュートの装備や衝撃緩和材の使用", "機体登録を抹消する"], ans:1, exp:"墜落した際の「衝撃」を和らげ、被害を最小限にします。" },
  { id:239, cat:"第6章", q:"建物や構造物の周辺に発生する、周辺より風速が速く複雑な流れを持つ風を何と呼ぶか？", opts:["貿易風", "ビル風", "偏西風"], ans:1, exp:"建物の配置により複雑で強い風が発生します。" },
  { id:240, cat:"第6章", q:"飛行機が失速を回避するために、離陸後の上昇角度はどう設定すべきか？", opts:["できるだけ垂直に近い角度", "失速しない適度な角度（指定された範囲内）", "角度は全く気にしなくてよい"], ans:1, exp:"過度な角度は失速を招くため、指定された範囲を守ります。" },
  { id:241, cat:"第6章", q:"マルチローターの自動帰還（RTH）時の高度設定において、考慮すべき事項はどれか？", opts:["飛行経路上の障害物を回避できる安全な高さ", "バッテリーを最も消費する高さ", "雲の中に隠れる高さ"], ans:0, exp:"自動帰還時に建物などにぶつからない高さを設定します。" },
  { id:242, cat:"第6章", q:"強風時につむじ風が発生する可能性がある、日射の強い広い場所の例はどれか？", opts:["密閉された体育館", "広い運動場や校庭", "深い森の中"], ans:1, exp:"強い日射による上昇気流で局地的な旋風が起きやすい場所です。" },
  { id:243, cat:"第6章", q:"飛行中に雷鳴が聞こえた場合の適切な判断はどれか？", opts:["雷は高いところに落ちるため、低空飛行を継続する", "速やかに飛行を中止し、機体を回収する", "雷に打たれても大丈夫なようにスピードを上げる"], ans:1, exp:"雷は機体故障や墜落の重大なリスクとなるため、直ちに中止します。" },
  { id:244, cat:"第6章", q:"海陸風において、夜間に「海上」に向かって吹く風の呼び方はどれか？", opts:["海風", "陸風", "谷風"], ans:1, exp:"夜間に陸から海へ吹く風が陸風です。" },
  { id:245, cat:"第6章", q:"気圧配置が「西高東低」の時、日本海側でもたらされる主なリスクはどれか？", opts:["雪と強い風", "極度の乾燥と無風", "南からの熱波"], ans:0, exp:"冬型の気圧配置では強い季節風と雪がもたらされます。" },
  { id:246, cat:"第6章", q:"補助者を配置して目視外飛行を行う際、補助者が操縦者に行うべきことは何か？", opts:["操縦の交代", "飛行状況や周囲の安全に関する適切な助言", "操縦者の横で世間話をする"], ans:1, exp:"操縦者の死角や周囲の危険を知らせるのが補助者の役割です。" },
  { id:247, cat:"第6章", q:"飛行計画を複数人で確認する運航体制を構築する主な目的はどれか？", opts:["責任を分散させるため", "確認漏れを防ぎ、安全性を向上させるため", "飛行許可申請の代行をさせるため"], ans:1, exp:"計画のミスを未然に防ぐためのダブルチェック体制です。" },

// State
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let userAnswers = [];
let lastMode = 'all';
let sessionWrongIds = []; // wrong question IDs from current modal

// ===== STORAGE HELPERS =====
function getHistory() {
  try { return JSON.parse(localStorage.getItem('drone_history') || '[]'); } catch { return []; }
}
function saveHistory(h) { localStorage.setItem('drone_history', JSON.stringify(h)); }

function getQStats() {
  try { return JSON.parse(localStorage.getItem('drone_qstats') || '{}'); } catch { return {}; }
}
function saveQStats(s) { localStorage.setItem('drone_qstats', JSON.stringify(s)); }

function getModeName(mode) {
  const map = { all:'全問題(250問)', rand:'ランダム25問', cat1:'第1・2章', cat2:'第3章', cat3:'第4章', cat4:'第5章', cat5:'第6章', weak:'苦手問題', custom:'選択問題' };
  return map[mode] || mode;
}

// ===== SAVE / RESUME =====
function getSaveData() {
  try { return JSON.parse(localStorage.getItem('drone_save') || 'null'); } catch { return null; }
}
function deleteSaveData() { localStorage.removeItem('drone_save'); }

function saveCurrentProgress() {
  // Don't save if there's nothing in progress or already finished
  if (!currentQuestions.length) return;
  const data = {
    mode: lastMode,
    questionIds: currentQuestions.map(q => q.id),
    currentIndex,
    score,
    userAnswers,
    savedAt: new Date().toLocaleString('ja-JP', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }),
  };
  localStorage.setItem('drone_save', JSON.stringify(data));
  showSaveIndicator();
}

function showSaveIndicator() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

function renderResumePanel() {
  const save = getSaveData();
  const panel = document.getElementById('resumePanel');
  if (!save) { panel.style.display = 'none'; return; }

  const answered = save.userAnswers.filter(a => a !== null).length;
  const total = save.questionIds.length;
  const pct = Math.round((answered / total) * 100);

  panel.style.display = 'block';
  document.getElementById('resumeMeta').innerHTML =
    `📚 ${getModeName(save.mode)} &nbsp;｜&nbsp; ⏱ ${save.savedAt}<br>` +
    `<span style="color:var(--accent);font-weight:700">${answered}/${total}問</span> 回答済み（正解 ${save.score}問）`;
  document.getElementById('resumeProgressFill').style.width = pct + '%';
}

function resumeQuiz() {
  const save = getSaveData();
  if (!save) return;

  // Rebuild question order from saved IDs
  const idMap = Object.fromEntries(QUESTIONS.map(q => [q.id, q]));
  currentQuestions = save.questionIds.map(id => idMap[id]).filter(Boolean);
  score = save.score;
  userAnswers = save.userAnswers;
  lastMode = save.mode;
  answered = false;

  // Find first unanswered question
  const nextUnanswered = save.userAnswers.findIndex(a => a === null);
  currentIndex = nextUnanswered >= 0 ? nextUnanswered : save.currentIndex;

  show('quizScreen');
  renderQuestion();
  showToast(`Q${currentIndex + 1}から再開します`);
}

function discardSave() {
  if (!confirm('保存中のデータを削除して最初からやり直しますか？')) return;
  deleteSaveData();
  renderResumePanel();
  loadStats();
  showToast('セーブデータを削除しました');
}

function exitQuizWithSave() {
  const hasProgress = currentQuestions.length > 0 && userAnswers.some(a => a !== null);
  if (hasProgress) {
    saveCurrentProgress();
    showToast('進捗をセーブしました。ホームから続きを再開できます');
  }
  show('startScreen');
  loadStats();
}

// ===== LOAD STATS FOR HOME =====
const BEST_MODES = [
  { key: 'all',  label: '全問題\n(250問)' },
  { key: 'cat1', label: '第1・2章' },
  { key: 'cat2', label: '第3章' },
  { key: 'cat3', label: '第4章' },
  { key: 'cat4', label: '第5章' },
  { key: 'cat5', label: '第6章' },
  { key: 'rand', label: 'ランダム\n25問' },
];

function getBestScores() {
  try { return JSON.parse(localStorage.getItem('drone_best_scores') || '{}'); } catch { return {}; }
}
function saveBestScores(s) { localStorage.setItem('drone_best_scores', JSON.stringify(s)); }

function loadStats() {
  const hist = getHistory();
  document.getElementById('attemptCount').textContent = hist.length;
  renderBestScoresGrid();

}

function renderBestScoresGrid() {
  const bests = getBestScores();

  grid.innerHTML = '';

  BEST_MODES.forEach(m => {

    }

    card.innerHTML = `
      <div class="best-score-val ${data ? '' : 'no-data'}" style="${data ? 'color:' + color : ''}">
        ${data ? data.pct + '%' : '—'}
      </div>
      <div class="best-score-mode">${m.label.replace('\n', '<br>')}</div>
      ${data ? `<div class="best-score-attempts">${data.attempts}回挑戦</div>` : ''}
    `;

function renderWeakPanel() {
  const qstats = getQStats();
  const weakIds = getWeakQuestionIds(qstats, 5);
  const panel = document.getElementById('weakPanel');
  if (weakIds.length === 0) { panel.style.display = 'none'; return; }

  panel.style.display = 'block';
  document.getElementById('weakPanelSub').textContent = `過去の挑戦で間違えた問題が ${weakIds.length} 問あります。集中的に復習しましょう。`;

  const pills = document.getElementById('weakPills');
  pills.innerHTML = '';
  weakIds.slice(0, 15).forEach(id => {
    const el = document.createElement('span');
    el.className = 'weak-pill-item';
    el.textContent = `問${id}`;
    pills.appendChild(el);
  });
  if (weakIds.length > 15) {
    const more = document.createElement('span');
    more.className = 'weak-pill-item';
    more.style.opacity = '0.6';
    more.textContent = `+${weakIds.length - 15}問`;
    pills.appendChild(more);
  }
}

function getWeakQuestionIds(qstats, minAttempts) {
  // Questions with accuracy < 70% and at least minAttempts attempts
  return Object.entries(qstats)
    .filter(([id, s]) => s.attempts >= minAttempts && (s.correct / s.attempts) < 0.7)
    .sort((a, b) => (a[1].correct / a[1].attempts) - (b[1].correct / b[1].attempts))
    .map(([id]) => parseInt(id));
}

function getAllWeakIds(qstats) {
  // Any question answered wrong at least once
  return Object.entries(qstats)
    .filter(([id, s]) => s.wrong > 0)
    .sort((a, b) => {
      const ra = a[1].correct / (a[1].attempts || 1);
      const rb = b[1].correct / (b[1].attempts || 1);
      return ra - rb;
    })
    .map(([id]) => parseInt(id));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== QUIZ LOGIC =====
function startQuiz(mode, specificIds) {
  lastMode = mode;
  let pool;

  if (specificIds) {
    pool = QUESTIONS.filter(q => specificIds.includes(q.id));
  } else if (mode === 'all') {
    pool = [...QUESTIONS];
  } else if (mode === 'rand') {
    pool = shuffle(QUESTIONS).slice(0, 25);
  } else if (mode === 'cat1') {
    pool = QUESTIONS.filter(q => q.cat === '第1・2章');
  } else if (mode === 'cat2') {
    pool = QUESTIONS.filter(q => q.cat === '第3章');
  } else if (mode === 'cat3') {
    pool = QUESTIONS.filter(q => q.cat === '第4章');
  } else if (mode === 'cat4') {
    pool = QUESTIONS.filter(q => q.cat === '第5章');
  } else if (mode === 'cat5') {
    pool = QUESTIONS.filter(q => q.cat === '第6章');
  } else if (mode === 'weak') {
    const qstats = getQStats();
    const weakIds = getAllWeakIds(qstats);
    pool = QUESTIONS.filter(q => weakIds.includes(q.id));
    if (pool.length === 0) {
      showToast('苦手問題のデータがありません。まず通常モードで挑戦してください。');
      return;
    }
  }

  currentQuestions = shuffle(pool);
  currentIndex = 0;
  score = 0;
  userAnswers = new Array(currentQuestions.length).fill(null);
  answered = false;

  show('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;

  document.getElementById('qCounter').textContent = `Q${currentIndex + 1} / ${total}`;
  document.getElementById('progressFill').style.width = ((currentIndex / total) * 100) + '%';
  document.getElementById('scoreBadge').textContent = `✓ ${score}`;
  document.getElementById('categoryTag').textContent = q.cat;
  document.getElementById('questionText').textContent = `問${q.id}｜${q.q}`;
  document.getElementById('explanationBox').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  answered = false;

  const letters = ['A', 'B', 'C'];
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i, btn);
    container.appendChild(btn);
  });

  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';
}

function selectAnswer(idx, btn) {
  if (answered) return;
  answered = true;

  const q = currentQuestions[currentIndex];
  userAnswers[currentIndex] = idx;
  const isCorrect = idx === q.ans;
  if (isCorrect) score++;

  // Update per-question stats
  const qstats = getQStats();
  if (!qstats[q.id]) qstats[q.id] = { attempts: 0, correct: 0, wrong: 0 };
  qstats[q.id].attempts++;
  if (isCorrect) qstats[q.id].correct++;
  else qstats[q.id].wrong++;
  saveQStats(qstats);

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('correct');
    else if (i === idx && !isCorrect) b.classList.add('incorrect');
  });

  const expBox = document.getElementById('explanationBox');
  expBox.style.display = 'block';
  expBox.innerHTML = `
    <div class="result-indicator ${isCorrect ? 'ok' : 'ng'}">
      ${isCorrect ? '✅ 正解！' : '❌ 不正解'}
    </div>
    <strong>解説：</strong>${q.exp}
  `;

  document.getElementById('scoreBadge').textContent = `✓ ${score}`;

  // Auto-save progress after every answer
  saveCurrentProgress();

  if (currentIndex < currentQuestions.length - 1) {
    document.getElementById('nextBtn').style.display = 'inline-flex';
    document.getElementById('nextBtn').textContent = '次の問題 →';
  } else {
    document.getElementById('nextBtn').style.display = 'inline-flex';
    document.getElementById('nextBtn').textContent = '結果を見る 📊';
  }
}

function nextQuestion() {
  if (currentIndex < currentQuestions.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  // Quiz finished — clear the save
  deleteSaveData();

  show('resultScreen');
  const total = currentQuestions.length;
  const pct = Math.round((score / total) * 100);

  // Save to history
  const wrongIds = currentQuestions
    .filter((q, i) => userAnswers[i] !== q.ans)
    .map(q => q.id);

  const hist = getHistory();
  hist.unshift({
    id: Date.now(),
    date: new Date().toLocaleString('ja-JP', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }),
    mode: lastMode,
    modeName: getModeName(lastMode),
    total,
    score,
    pct,
    wrongIds,
    questionIds: currentQuestions.map(q => q.id)
  });
  if (hist.length > 50) hist.pop();
  saveHistory(hist);

  // Update per-mode best score
  const bests = getBestScores();
  const modeKey = ['all','cat1','cat2','cat3','cat4','cat5','rand'].includes(lastMode) ? lastMode : null;
  if (modeKey) {
    if (!bests[modeKey]) bests[modeKey] = { pct: 0, attempts: 0 };
    bests[modeKey].attempts++;
    if (pct > bests[modeKey].pct) bests[modeKey].pct = pct;
    saveBestScores(bests);
  }

  loadStats();

  document.getElementById('resCorrect').textContent = score;
  document.getElementById('resIncorrect').textContent = total - score;
  document.getElementById('resTotal').textContent = total;

  const circ = document.getElementById('resultCircle');
  const circumference = 502;
  const offset = circumference - (pct / 100) * circumference;

  circ.style.stroke = pct >= 80 ? 'var(--correct)' : pct >= 60 ? 'var(--accent)' : 'var(--incorrect)';
  setTimeout(() => { circ.style.strokeDashoffset = offset; }, 100);

  let anim = 0;
  const step = () => {
    if (anim < pct) {
      anim++;
      document.getElementById('resultPct').textContent = anim + '%';
      setTimeout(step, 20);
    }
  };
  step();

  let grade, sub, color;
  if (pct >= 90) { grade = '🏆 優秀！'; sub = '素晴らしい成績です！合格圏内です。'; color = 'var(--correct)'; }
  else if (pct >= 70) { grade = '✈️ 合格圏内'; sub = '良好な成績です。苦手分野を復習しましょう。'; color = 'var(--accent)'; }
  else if (pct >= 50) { grade = '📚 もう少し'; sub = '基礎を固めて再挑戦しましょう。'; color = 'var(--warn)'; }
  else { grade = '🔄 要復習'; sub = '各編の解説をしっかり確認しましょう。'; color = 'var(--incorrect)'; }

  const gradeEl = document.getElementById('gradeText');
  gradeEl.style.color = color;
  gradeEl.textContent = grade;
  document.getElementById('gradeSub').textContent = sub;
}

function showReview() {
  show('reviewScreen');
  const content = document.getElementById('reviewContent');
  content.innerHTML = '';

  currentQuestions.forEach((q, i) => {
    const ua = userAnswers[i];
    const isCorrect = ua === q.ans;
    const letters = ['A', 'B', 'C'];

    const card = document.createElement('div');
    card.className = `review-card ${isCorrect ? 'right' : 'wrong'}`;
    card.innerHTML = `
      <div class="review-q-num">${q.cat} / 問${q.id}</div>
      <div class="review-q-text">${q.q}</div>
      <div class="review-answers">
        ${!isCorrect ? `<div class="review-your-answer">あなたの答え：${ua !== null ? letters[ua] + '. ' + q.opts[ua] : '未回答'}</div>` : ''}
        <div class="review-correct-answer">✅ 正解：${letters[q.ans]}. ${q.opts[q.ans]}</div>
      </div>
      <div class="review-explanation">${q.exp}</div>
    `;
    content.appendChild(card);
  });
}

function renderWeakAnalysis() {
  const qstats = getQStats();
  const container = document.getElementById('weakAnalysis');

  const attempted = Object.keys(qstats);
  if (attempted.length === 0) {
    container.innerHTML = `<div class="history-empty">📊 問題ごとの分析は<br>クイズに挑戦すると<br>表示されます</div>`;
    return;
  }

  const weakIds = getAllWeakIds(qstats);
  const masterIds = Object.entries(qstats)
    .filter(([id, s]) => s.attempts >= 3 && s.correct === s.attempts)
    .map(([id]) => parseInt(id));

  container.innerHTML = '';

  // Summary
  const summary = document.createElement('div');
  summary.className = 'stat-card';
  summary.style.cssText = 'margin-bottom:16px;';
  summary.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center">
      <div><div class="stat-num" style="font-size:24px">${attempted.length}</div><div class="stat-label">挑戦済み問題</div></div>
      <div><div class="stat-num" style="font-size:24px;color:var(--incorrect)">${weakIds.length}</div><div class="stat-label">苦手問題</div></div>
      <div><div class="stat-num" style="font-size:24px;color:var(--correct)">${masterIds.length}</div><div class="stat-label">完璧な問題</div></div>
    </div>
  `;
  container.appendChild(summary);

  if (weakIds.length > 0) {
    const weakSection = document.createElement('div');
    weakSection.style.marginBottom = '16px';
    weakSection.innerHTML = `<div class="section-label" style="margin-bottom:10px">🔥 正答率の低い問題</div>`;

    const list = document.createElement('div');
    list.style.cssText = 'display:flex;flex-direction:column;gap:8px;';

    weakIds.slice(0, 20).forEach(id => {
      const s = qstats[id];
      const pct = Math.round((s.correct / s.attempts) * 100);
      const q = QUESTIONS.find(q => q.id === id);
      const item = document.createElement('div');
      item.style.cssText = 'background:var(--card);border:1px solid var(--card-border);border-radius:8px;padding:12px 14px;';
      item.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-family:Space Mono,monospace;font-size:11px;color:var(--text-dim)">問${id} / ${q ? q.cat : ''}</span>
          <span style="font-family:Space Mono,monospace;font-size:13px;color:${pct < 50 ? 'var(--incorrect)' : 'var(--warn)'};font-weight:700">${pct}%</span>
        </div>
        <div style="font-size:12px;line-height:1.5;color:var(--text-dim);margin-bottom:8px">${q ? q.q.slice(0, 60) + (q.q.length > 60 ? '…' : '') : ''}</div>
        <div style="display:flex;gap:8px;font-size:11px;color:var(--text-dim);margin-bottom:6px">
          <span>${s.attempts}回挑戦</span>
          <span style="color:var(--correct)">✓ ${s.correct}回正解</span>
          <span style="color:var(--incorrect)">✗ ${s.wrong}回不正解</span>
        </div>
        <div class="accuracy-bar"><div class="accuracy-fill" style="width:${pct}%;background:${pct < 50 ? 'var(--incorrect)' : 'var(--warn)'}"></div></div>
      `;
      list.appendChild(item);
    });

    weakSection.appendChild(list);
    container.appendChild(weakSection);

    const btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    btn.style.width = '100%';
    btn.textContent = '💪 苦手問題を集中練習';
    btn.onclick = () => startQuiz('weak');
    container.appendChild(btn);
  } else {
    const ok = document.createElement('div');
    ok.className = 'history-empty';
    ok.innerHTML = '🎉 現時点で苦手問題はありません！<br>引き続き練習を続けましょう。';
    container.appendChild(ok);
  }
}

function openHistoryDetail(h) {
  sessionWrongIds = h.wrongIds;
  const modal = document.getElementById('historyDetailModal');
  modal.style.display = 'flex';

  document.getElementById('modalTitle').textContent = `${h.date} — ${h.modeName}`;

  const allQs = QUESTIONS.filter(q => h.questionIds.includes(q.id));
  const letters = ['A', 'B', 'C'];

  let html = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;text-align:center">
      <div style="background:var(--card);border-radius:8px;padding:12px">
        <div style="font-family:Space Mono,monospace;font-size:22px;font-weight:700;color:${h.pct >= 80 ? 'var(--correct)' : h.pct >= 60 ? 'var(--accent)' : 'var(--incorrect)'}">${h.pct}%</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:4px">正解率</div>
      </div>
      <div style="background:var(--card);border-radius:8px;padding:12px">
        <div style="font-family:Space Mono,monospace;font-size:22px;font-weight:700;color:var(--correct)">${h.score}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:4px">正解</div>
      </div>
      <div style="background:var(--card);border-radius:8px;padding:12px">
        <div style="font-family:Space Mono,monospace;font-size:22px;font-weight:700;color:var(--incorrect)">${h.wrongIds.length}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:4px">不正解</div>
      </div>
    </div>
  `;

  if (h.wrongIds.length > 0) {
    html += `<div style="font-size:12px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;font-family:Space Mono,monospace;margin-bottom:10px">❌ 間違えた問題</div>`;
    html += `<div class="detail-q-list">`;
    h.wrongIds.forEach(id => {
      const q = QUESTIONS.find(q => q.id === id);
      if (!q) return;
      html += `
        <div class="detail-q-item wrong-item">
          <span class="detail-q-icon">❌</span>
          <div>
            <div style="font-size:11px;color:var(--text-dim);margin-bottom:3px">問${q.id} / ${q.cat}</div>
            <div style="font-size:12px;line-height:1.5">${q.q.slice(0, 80)}${q.q.length > 80 ? '…' : ''}</div>
            <div style="font-size:11px;color:var(--correct);margin-top:4px">✅ 正解：${letters[q.ans]}. ${q.opts[q.ans].slice(0, 40)}${q.opts[q.ans].length > 40 ? '…' : ''}</div>
          </div>
        </div>
      `;
    });
    html += `</div>`;
  } else {
    html += `<div style="text-align:center;color:var(--correct);padding:20px;font-size:14px">🎉 全問正解！</div>`;
  }

  document.getElementById('modalContent').innerHTML = html;

  const retryBtn = document.getElementById('modalRetryBtn');
  if (h.wrongIds.length > 0) {
    retryBtn.style.display = 'block';
    retryBtn.textContent = `この回の間違い ${h.wrongIds.length} 問を復習する`;
    retryBtn.onclick = () => {
      closeDetailModal();
      startQuiz('custom', h.wrongIds);
    };
  } else {
    retryBtn.style.display = 'none';
  }
}

function closeDetailModal() {
  document.getElementById('historyDetailModal').style.display = 'none';
}

function closeModal(e) {
  if (e.target.id === 'historyDetailModal') closeDetailModal();
}

function restartQuiz() {
  startQuiz(lastMode);
}

function exitQuiz() {
  show('startScreen');
}

function goHome() {
  show('startScreen');
}

function show(id) {
  ['startScreen','quizScreen','resultScreen','reviewScreen','historyScreen'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = 'none';
    el.style.flexDirection = '';
  });
  const target = document.getElementById(id);
  target.style.display = 'flex';
  target.style.flexDirection = 'column';
  window.scrollTo(0, 0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
loadStats();
show('startScreen');

// ===== PWA: Service Worker 登録 =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}

// ===== PWA: ホーム画面追加バナー =====
let deferredPrompt = null;
const installBanner = document.getElementById('installBanner');
const installBtn = document.getElementById('installBtn');
const installDismiss = document.getElementById('installDismiss');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // 初回訪問から3秒後に表示（すぐ出ると邪魔なため）
  setTimeout(() => {
    if (installBanner) installBanner.style.transform = 'translateY(0)';
  }, 3000);
});

if (installBtn) {
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    if (installBanner) installBanner.style.transform = 'translateY(120px)';
  });
}

if (installDismiss) {
  installDismiss.addEventListener('click', () => {
    if (installBanner) installBanner.style.transform = 'translateY(120px)';
  });
}

// インストール済み（standalone）の場合はバナーを非表示
if (window.matchMedia('(display-mode: standalone)').matches) {
  if (installBanner) installBanner.style.display = 'none';
}
</script>
